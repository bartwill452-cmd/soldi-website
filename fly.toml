app = 'trysoldi'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[deploy]
  strategy = 'immediate'

[[vm]]
  memory = '4096'
  cpu_kind = 'shared'
  cpus = 4
