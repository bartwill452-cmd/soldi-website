app = 'trysoldi'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  # Health checks — Fly auto-restarts the machine when these fail
  [[http_service.checks]]
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[deploy]
  strategy = 'immediate'

# Auto-restart machine on OOM or crash (max 5 restarts)
[[restart]]
  policy = "on-failure"
  max_retries = 5

[env]
  DISABLED_SCRAPERS = "stakeus,betmgm,hardrock,betonline,caesars,buckeye"
  GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSizb2PDpGoNGhompqyBttJzdbjq1KlthqDM9E8kDzDkDvnSerQbETkVswGS7esgmd/exec"

[[vm]]
  memory = '4096'
  cpu_kind = 'shared'
  cpus = 4
