<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webinar Registrations — Soldi Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
  .header h1 { font-size: 24px; font-weight: 800; }
  .header h1 span { color: #00C853; }
  .stats { display: flex; gap: 16px; flex-wrap: wrap; }
  .stat-card { background: #141414; border: 1px solid #222; border-radius: 12px; padding: 16px 24px; min-width: 140px; }
  .stat-card .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .stat-card .value { font-size: 28px; font-weight: 800; color: #00C853; }
  .login-screen { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
  .login-box { background: #141414; border: 1px solid #222; border-radius: 16px; padding: 40px; max-width: 400px; width: 100%; text-align: center; }
  .login-box h2 { margin-bottom: 8px; font-size: 22px; }
  .login-box p { color: #888; margin-bottom: 24px; font-size: 14px; }
  .login-box input { width: 100%; padding: 14px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 15px; margin-bottom: 16px; outline: none; }
  .login-box input:focus { border-color: #00C853; }
  .login-box button { width: 100%; padding: 14px; background: #00C853; color: #000; font-weight: 800; font-size: 15px; border: none; border-radius: 10px; cursor: pointer; }
  .login-box button:hover { background: #00e65c; }
  .login-box .error { color: #ff4444; font-size: 13px; margin-top: 8px; display: none; }
  table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  th { text-align: left; padding: 12px 16px; background: #141414; color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #222; }
  td { padding: 12px 16px; border-bottom: 1px solid #1a1a1a; font-size: 14px; color: #ccc; }
  tr:hover td { background: #141414; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
  .badge-yes { background: rgba(0,200,83,0.15); color: #00C853; }
  .badge-no { background: rgba(255,68,68,0.15); color: #ff4444; }
  .toolbar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .toolbar input { padding: 10px 14px; background: #141414; border: 1px solid #222; border-radius: 8px; color: #fff; font-size: 14px; min-width: 240px; }
  .toolbar button { padding: 10px 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; cursor: pointer; }
  .toolbar button:hover { border-color: #00C853; }
  .empty { text-align: center; padding: 60px 24px; color: #666; }
  .empty p { font-size: 18px; margin-bottom: 8px; }
  @media (max-width: 768px) {
    .container { padding: 16px; }
    th, td { padding: 8px; font-size: 12px; }
    .stat-card .value { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <h2>Webinar Admin</h2>
    <p>Enter admin password to view registrations</p>
    <input type="password" id="pw-input" placeholder="Password" autofocus>
    <button onclick="doLogin()">View Registrations</button>
    <div class="error" id="login-error">Invalid password</div>
  </div>
</div>

<!-- DASHBOARD (hidden until login) -->
<div id="dashboard" style="display:none;">
  <div class="container">
    <div class="header">
      <h1><span>S</span> Webinar Registrations</h1>
      <div class="stats">
        <div class="stat-card">
          <div class="label">Total Signups</div>
          <div class="value" id="total-count">0</div>
        </div>
        <div class="stat-card">
          <div class="label">SMS Opted In</div>
          <div class="value" id="sms-count">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Newsletter</div>
          <div class="value" id="newsletter-count">0</div>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" id="search" placeholder="Search by name, email, or phone..." oninput="filterTable()">
      <button onclick="exportCSV()">Export CSV</button>
      <button onclick="refreshData()">Refresh</button>
    </div>

    <div id="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Interest</th>
            <th>Newsletter</th>
            <th>SMS</th>
            <th>Registered</th>
          </tr>
        </thead>
        <tbody id="reg-body"></tbody>
      </table>
    </div>
    <div class="empty" id="empty-state" style="display:none;">
      <p>No registrations yet</p>
      <span>Signups will appear here in real time</span>
    </div>
  </div>
</div>

<script>
let storedPw = '';
let allRegistrations = [];

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const pw = document.getElementById('pw-input').value.trim();
  if (!pw) return;
  try {
    const r = await fetch('/api/webinar/registrations/simple?pw=' + encodeURIComponent(pw));
    if (!r.ok) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    storedPw = pw;
    const data = await r.json();
    allRegistrations = data.registrations || [];
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderDashboard();
  } catch (e) {
    document.getElementById('login-error').style.display = 'block';
  }
}

function renderDashboard() {
  const regs = allRegistrations;
  document.getElementById('total-count').textContent = regs.length;
  document.getElementById('sms-count').textContent = regs.filter(r => r.smsConsent).length;
  document.getElementById('newsletter-count').textContent = regs.filter(r => r.newsletter).length;
  renderTable(regs);
}

function renderTable(regs) {
  const tbody = document.getElementById('reg-body');
  if (regs.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('table-wrap').style.display = 'none';
    return;
  }
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('table-wrap').style.display = 'block';
  tbody.innerHTML = regs.map((r, i) => `
    <tr>
      <td>${i + 1}</td>
      <td style="color:#fff;font-weight:600;">${esc(r.firstName)}</td>
      <td>${esc(r.email)}</td>
      <td>${esc(r.phone)}</td>
      <td>${esc(r.interest || '-')}</td>
      <td><span class="badge ${r.newsletter ? 'badge-yes' : 'badge-no'}">${r.newsletter ? 'Yes' : 'No'}</span></td>
      <td><span class="badge ${r.smsConsent ? 'badge-yes' : 'badge-no'}">${r.smsConsent ? 'Yes' : 'No'}</span></td>
      <td>${formatDate(r.registeredAt)}</td>
    </tr>
  `).join('');
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  if (!q) return renderTable(allRegistrations);
  renderTable(allRegistrations.filter(r =>
    (r.firstName || '').toLowerCase().includes(q) ||
    (r.email || '').toLowerCase().includes(q) ||
    (r.phone || '').includes(q)
  ));
}

async function refreshData() {
  const r = await fetch('/api/webinar/registrations/simple?pw=' + encodeURIComponent(storedPw));
  if (r.ok) {
    const data = await r.json();
    allRegistrations = data.registrations || [];
    renderDashboard();
  }
}

function exportCSV() {
  const header = 'First Name,Email,Phone,Interest,Newsletter,SMS Consent,Registered At\n';
  const rows = allRegistrations.map(r =>
    `"${esc(r.firstName)}","${esc(r.email)}","${esc(r.phone)}","${esc(r.interest || '')}",${r.newsletter ? 'Yes' : 'No'},${r.smsConsent ? 'Yes' : 'No'},"${r.registeredAt || ''}"`
  ).join('\n');
  const blob = new Blob([header + rows], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'webinar-registrations.csv';
  a.click();
}

function esc(s) { return (s || '').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function formatDate(d) {
  if (!d) return '-';
  try { return new Date(d).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true }); }
  catch { return d; }
}
</script>
</body>
</html>
