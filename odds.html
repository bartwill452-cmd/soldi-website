<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odds Screen - Soldi</title>
  <script>
    (function() {
      var t = localStorage.getItem('soldi_theme');
      if (!t) t = 'dark';
      if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="/soldi-analytics.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg-secondary); color: var(--text-primary); font-family: 'Inter', system-ui, sans-serif; }

    /* ── Nav ── */
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(13,17,23,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border-color); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { height: 32px; }
    .nav-logo span { font-weight: 800; font-size: 20px; color: var(--text-heading); }
    .nav-links { display: flex; align-items: center; gap: 16px; }
    .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: #22c55e; }

    /* ── Main ── */
    .odds-page { padding: 80px 16px 40px; min-height: 100vh; max-width: 1600px; margin: 0 auto; }

    /* ── Gate ── */
    .odds-gate { max-width: 460px; margin: 100px auto 0; text-align: center; }
    .odds-gate h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .odds-gate p { color: var(--text-muted); margin-bottom: 24px; font-size: 14px; }
    .odds-gate button { padding: 12px 24px; background: linear-gradient(135deg, #22c55e, #16a34a); color: var(--bg-primary); font-weight: 700; font-size: 14px; border: none; border-radius: 10px; cursor: pointer; }
    .odds-gate .error-msg { color: #ef4444; font-size: 13px; margin-top: 8px; }

    /* ── Dashboard ── */
    .odds-dashboard { display: none; }

    /* ── Tabs ── */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 20px; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 4px; border: 1px solid rgba(255,255,255,0.06); }
    .tab-btn { flex: 1; padding: 10px 16px; background: transparent; border: none; border-radius: 8px; color: #71717a; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: #22c55e; color: #050507; }
    .tab-btn:hover:not(.active) { color: #e4e4e7; background: rgba(255,255,255,0.05); }

    /* ── Sport Filters ── */
    .sport-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .sport-chip { padding: 6px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; color: #a1a1aa; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .sport-chip.active { background: rgba(34,197,94,0.15); border-color: #22c55e; color: #22c55e; }
    .sport-chip:hover:not(.active) { border-color: rgba(255,255,255,0.2); color: #e4e4e7; }

    /* ── Stats Bar ── */
    .stats-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 16px 20px; flex: 1; min-width: 140px; }
    .stat-card .label { font-size: 12px; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .stat-card .value { font-size: 22px; font-weight: 800; color: var(--text-heading); }
    .stat-card .value.green { color: #22c55e; }

    /* ── Loading ── */
    .loading-state { text-align: center; padding: 60px 20px; color: #71717a; }
    .loading-state .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #22c55e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; color: #52525b; font-size: 15px; }

    /* ── Tab Content ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Period Group Tabs (Row 1) ── */
    .period-tabs { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
    .period-tab { padding: 7px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; color: #a1a1aa; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .period-tab.active { background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.3); color: #3b82f6; }
    .period-tab:hover:not(.active) { background: rgba(255,255,255,0.07); color: #e4e4e7; }

    /* ── Market Tabs (Row 2) ── */
    .market-tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; flex-direction: column; }
    .market-tabs-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .market-tab { padding: 6px 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; color: #a1a1aa; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .market-tab.active { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.3); color: #22c55e; }
    .market-tab:hover:not(.active) { background: rgba(255,255,255,0.07); color: #e4e4e7; }

    /* ── Search Box ── */
    .search-box { margin-bottom: 16px; }
    .search-box input { width: 100%; max-width: 320px; padding: 10px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #fff; font-size: 13px; outline: none; }
    .search-box input:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.12); }
    .search-box input::placeholder { color: #52525b; }

    /* ═══════════════════════════════════════════
       ODDS TABLE — Pick The Odds Style
       Sportsbook icons across top, odds underneath
       ═══════════════════════════════════════════ */

    .odds-table-wrapper { overflow-x: auto; border-radius: 14px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.02); }

    .odds-table { width: 100%; border-collapse: collapse; min-width: 900px; }

    /* Column headers — sportsbook icons */
    .odds-table thead th {
      padding: 12px 6px 10px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: #71717a;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .odds-table thead th:first-child {
      text-align: left;
      padding-left: 16px;
      min-width: 220px;
      position: sticky;
      left: 0;
      z-index: 3;
      background: rgba(13,17,23,0.98);
    }

    /* Sportsbook logo in header */
    .book-logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      margin: 0 auto 4px;
      object-fit: contain;
      background: rgba(255,255,255,0.06);
      padding: 2px;
    }
    /* Fallback text icon when no image */
    .book-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 11px;
      margin: 0 auto 4px;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .book-icon-best { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .book-icon-avg { background: rgba(255,255,255,0.15); color: #a1a1aa; }

    .book-label { font-size: 10px; color: #71717a; font-weight: 500; }

    /* Special columns: Best & Avg */
    .col-best, .col-avg { background: rgba(255,255,255,0.03) !important; }

    /* Event rows */
    .odds-table tbody tr.event-separator td {
      padding: 0;
      height: 8px;
      background: transparent;
      border: none;
    }

    .odds-table tbody tr.event-info-row td {
      padding: 10px 16px 2px;
      border: none;
      background: rgba(255,255,255,0.015);
    }

    .event-info { display: flex; align-items: center; gap: 12px; }
    .event-info .event-time-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 56px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      font-size: 11px;
      color: #71717a;
      line-height: 1.3;
    }
    .event-info .event-time-box .time-val { font-weight: 700; color: #a1a1aa; font-size: 12px; }
    .event-info .event-time-box .date-val { font-size: 10px; }
    .event-matchup { font-weight: 700; font-size: 15px; color: #fff; }
    .event-sport-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-right: 8px; }

    /* Odds rows (home team & away team) */
    .odds-table tbody tr.team-row td {
      padding: 6px 6px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .odds-table tbody tr.team-row:last-child td {
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .team-row td:first-child {
      text-align: left;
      padding-left: 16px;
      font-weight: 600;
      font-size: 13px;
      color: #e4e4e7;
      position: sticky;
      left: 0;
      background: rgba(13,17,23,0.98);
      z-index: 1;
    }

    /* Odds cell */
    .odds-val {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 13px;
      font-family: 'Inter', monospace;
      cursor: default;
      transition: background 0.15s;
      min-width: 58px;
      text-align: center;
    }
    .odds-val:hover { background: rgba(255,255,255,0.06); }
    .odds-val.positive { color: #22c55e; }
    .odds-val.negative { color: #e4e4e7; }
    .odds-val.best-highlight {
      background: rgba(34,197,94,0.15);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.3);
    }
    .odds-val.empty { color: #3f3f46; }
    .odds-val.best-col {
      background: rgba(34,197,94,0.12);
      color: #22c55e;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .best-book-logo {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .odds-val.avg-col {
      color: #a1a1aa;
      font-weight: 600;
    }

    /* Point spread label underneath odds */
    .spread-label { font-size: 10px; color: #52525b; margin-top: 1px; }

    /* ── Best Odds / Average Boxes ── */
    .col-best-header, .col-avg-header {
      min-width: 70px;
    }

    /* ── EV Cards (Tab 2) ── */
    .ev-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 18px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; transition: border-color 0.2s; cursor: pointer; }
    .ev-card:hover { border-color: rgba(34,197,94,0.2); }
    .ev-left { display: flex; flex-direction: column; gap: 4px; }
    .ev-game { font-size: 13px; color: #a1a1aa; }
    .ev-team { font-size: 16px; font-weight: 700; color: #fff; }
    .ev-market { font-size: 12px; color: #71717a; }
    .ev-right { display: flex; gap: 16px; align-items: center; text-align: center; }
    .ev-metric { display: flex; flex-direction: column; gap: 2px; }
    .ev-metric .label { font-size: 10px; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; }
    .ev-metric .val { font-size: 16px; font-weight: 800; }
    .ev-metric .val.green { color: #22c55e; }
    .ev-metric .val.blue { color: #3b82f6; }
    .ev-book { display: inline-block; padding: 3px 8px; background: rgba(255,255,255,0.06); border-radius: 6px; font-size: 11px; font-weight: 600; color: #a1a1aa; margin-top: 4px; }

    /* ── EV Detail Modal ── */
    .ev-detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .ev-detail-overlay.open { opacity: 1; pointer-events: auto; }
    .ev-detail-modal { background: #0d0d12; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 28px; max-width: 600px; width: 95%; max-height: 80vh; overflow-y: auto; }
    .ev-detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .ev-detail-title { font-size: 18px; font-weight: 800; color: #fff; }
    .ev-detail-subtitle { font-size: 13px; color: #71717a; margin-top: 4px; }
    .ev-detail-close { background: none; border: none; color: #71717a; font-size: 24px; cursor: pointer; padding: 0 4px; }
    .ev-detail-close:hover { color: #fff; }
    .ev-detail-stats { display: flex; gap: 20px; margin-bottom: 20px; padding: 14px; background: rgba(34,197,94,0.06); border: 1px solid rgba(34,197,94,0.15); border-radius: 10px; }
    .ev-detail-stat { text-align: center; }
    .ev-detail-stat .label { font-size: 10px; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; }
    .ev-detail-stat .val { font-size: 18px; font-weight: 800; margin-top: 2px; }
    .ev-odds-table { width: 100%; border-collapse: collapse; }
    .ev-odds-table th { font-size: 11px; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); text-align: left; }
    .ev-odds-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; color: #e4e4e7; }
    .ev-odds-table tr:hover { background: rgba(255,255,255,0.02); }
    .ev-odds-table .book-cell { display: flex; align-items: center; gap: 8px; }
    .ev-odds-table .book-cell img { width: 20px; height: 20px; border-radius: 4px; }
    .ev-odds-table .best-odds { color: #22c55e; font-weight: 800; }
    .ev-odds-table .ev-source { color: #06b6d4; font-weight: 700; }
    .ev-odds-no-data { color: #3f3f46; }

    /* ── Arb Cards (Tab 3) ── */
    .arb-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 18px; margin-bottom: 10px; }
    .arb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .arb-game { font-size: 15px; font-weight: 700; color: #fff; }
    .arb-profit { font-size: 20px; font-weight: 800; color: #22c55e; }
    .arb-profit-label { font-size: 11px; color: #71717a; }
    .arb-legs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .arb-leg { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 12px 14px; }
    .arb-leg .book { font-size: 11px; color: #71717a; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
    .arb-leg .team { font-size: 14px; font-weight: 700; color: #e4e4e7; }
    .arb-leg .odds { font-size: 14px; font-weight: 700; color: #3b82f6; }
    .arb-leg .stake { font-size: 13px; color: #22c55e; font-weight: 600; margin-top: 4px; }

    /* ── Refresh ── */
    .refresh-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-size: 12px; color: #52525b; }
    .refresh-bar button { padding: 6px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #a1a1aa; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .refresh-bar button:hover { background: rgba(34,197,94,0.12); color: #22c55e; border-color: rgba(34,197,94,0.3); }

    /* ── Sport Badge Colors ── */
    .badge-nba { background: rgba(200,16,46,0.15); color: #e8384f; }
    .badge-nfl { background: rgba(1,51,105,0.2); color: #6b9bd2; }
    .badge-mlb { background: rgba(0,51,160,0.2); color: #5b8fd4; }
    .badge-nhl { background: rgba(0,0,0,0.3); color: #a1a1aa; }
    .badge-ncaab { background: rgba(255,165,0,0.15); color: #f59e0b; }
    .badge-ncaaf { background: rgba(255,165,0,0.15); color: #f59e0b; }
    .badge-soccer { background: rgba(56,0,60,0.3); color: #c084fc; }
    .badge-mma { background: rgba(213,0,0,0.15); color: #ef4444; }
    .badge-boxing { background: rgba(213,0,0,0.15); color: #ef4444; }
    .badge-tennis { background: rgba(196,181,49,0.15); color: #eab308; }
    .badge-default { background: rgba(255,255,255,0.06); color: #a1a1aa; }

    /* ── Line Movement Modal ── */
    .lm-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
      justify-content: center; align-items: center;
    }
    .lm-overlay.open { display: flex; }
    .lm-modal {
      background: #13171f; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; width: 90%; max-width: 880px; max-height: 85vh;
      overflow-y: auto; padding: 24px; position: relative;
    }
    .lm-close {
      position: absolute; top: 12px; right: 16px; background: none;
      border: none; color: #71717a; font-size: 22px; cursor: pointer;
      padding: 4px 8px; border-radius: 6px;
    }
    .lm-close:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .lm-title { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .lm-subtitle { font-size: 13px; color: #71717a; margin-bottom: 12px; }
    .lm-market-tabs { display: flex; gap: 4px; margin-bottom: 14px; background: rgba(255,255,255,0.03); border-radius: 8px; padding: 3px; border: 1px solid rgba(255,255,255,0.06); }
    .lm-market-tab { flex: 1; padding: 6px 10px; background: transparent; border: none; border-radius: 6px; color: #71717a; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: center; }
    .lm-market-tab.active { background: #22c55e; color: #050507; }
    .lm-market-tab:hover:not(.active) { background: rgba(255,255,255,0.06); color: #a1a1aa; }
    .lm-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .lm-filter-chip {
      padding: 5px 12px; border-radius: 16px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04); color: #a1a1aa; transition: all 0.15s;
    }
    .lm-filter-chip.active { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.3); color: #22c55e; }
    .lm-filter-chip:hover:not(.active) { background: rgba(255,255,255,0.07); color: #e4e4e7; }
    .lm-chart-wrap { position: relative; height: 320px; margin-bottom: 20px; }
    .lm-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .lm-table th {
      text-align: left; padding: 8px 10px; color: #71717a; font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .lm-table td {
      padding: 6px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); color: #a1a1aa;
    }
    .lm-table .lm-up { color: #22c55e; }
    .lm-table .lm-down { color: #ef4444; }
    .lm-empty { text-align: center; padding: 40px; color: #52525b; font-size: 14px; }

    /* Make odds cells clickable */
    .odds-val.clickable { cursor: pointer; }
    .odds-val.clickable:hover { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); }

    /* ── Book Filter Chips ── */
    .book-filter-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04); color: #71717a; transition: all 0.15s;
      user-select: none;
    }
    .book-filter-chip.active {
      background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.3); color: #22c55e;
    }
    .book-filter-chip:hover { background: rgba(255,255,255,0.07); }
    .book-filter-chip img { width: 18px; height: 18px; border-radius: 4px; object-fit: contain; }

function renderMarketTabs() {
  const config = SPORT_MARKET_CONFIG[currentSport];
  const container = document.getElementById('marketTabs');

  if (!config) {
    // Fallback: simple flat tabs
    const tabs = DEFAULT_MARKET_TABS;
    if (!tabs.find(t => t.key === currentMarket)) currentMarket = tabs[0].key;
    container.innerHTML = tabs.map(tab =>
      `<div class="market-tab ${tab.key === currentMarket ? 'active' : ''}" onclick="switchMarket('${tab.key}', this)">${tab.label}</div>`
    ).join('');
    return;
  }

  const groups = config.groups;

  // Ensure current period group exists for this sport
  if (!groups.find(g => g.key === currentPeriodGroup)) {
    currentPeriodGroup = groups[0].key;
  }

  // Get markets for the active period group
  const activeGroup = groups.find(g => g.key === currentPeriodGroup);
  const markets = activeGroup ? activeGroup.markets : groups[0].markets;

  // Ensure current market exists in this group
  if (!markets.find(m => m.key === currentMarket)) {
    currentMarket = markets[0].key;
  }

  // Row 1: Period group tabs (only show if >1 group)
  let html = '';
  if (groups.length > 1) {
    html += '<div class="period-tabs">';
    html += groups.map(g =>
      `<div class="period-tab ${g.key === currentPeriodGroup ? 'active' : ''}" onclick="switchPeriodGroup('${g.key}')">${g.label}</div>`
    ).join('');

  html += markets.map(m =>
    `<div class="market-tab ${m.key === currentMarket ? 'active' : ''}" onclick="switchMarket('${m.key}', this)">${m.label}</div>`
  ).join('');
  html += '</div>';

  container.innerHTML = html;
}

// ── Main Line Detection ──
// For spreads/totals, books can return alternate lines (e.g. +1.5, +3.5, +5.5).
// We determine the "consensus main line" per event across all books and show only that.

function computeConsensusPointForEvent(event, marketKey, side) {
  // side: 'home'|'away' for spreads, 'over'|'under' for totals
  // Counts point values across all bookmakers for THIS event only
  const pointCounts = {}; // point → count
  let matchName;
  if (side === 'home') matchName = event.homeTeam;
  else if (side === 'away') matchName = event.awayTeam;
  else if (side === 'over') matchName = 'Over';
  else matchName = 'Under';

  for (const bm of event.bookmakers) {
    const market = bm.markets?.[marketKey];
    if (!market || !market.outcomes) continue;
    // Find ALL outcomes matching this name (may include alternates)
    const matches = market.outcomes.filter(o => o.name === matchName && o.point != null);
    if (matches.length === 1) {
      // Book only has one line → it's their main line, counts toward consensus
      const p = matches[0].point;
      pointCounts[p] = (pointCounts[p] || 0) + 1;
    }
  }
  // Most common point across books for THIS event is the main line
  let bestPoint = null, bestCount = 0;
  for (const [p, c] of Object.entries(pointCounts)) {
    if (c > bestCount) { bestCount = c; bestPoint = parseFloat(p); }
  }
  return bestPoint;
}

// Check if two names share a last name (for MMA fighter matching)
function _lastNameMatch(a, b) {
  const aLast = a.trim().split(/\s+/).pop().toLowerCase();
  const bLast = b.trim().split(/\s+/).pop().toLowerCase();
  return aLast.length >= 3 && aLast === bLast;
}

// Generic market data extractor for any market key
// For spreads/totals with alternates, picks the main-line outcome
function getMarketDataForBook(bm, marketKey, event) {
  const market = bm.markets?.[marketKey];
  if (!market || !market.outcomes || market.outcomes.length === 0) return null;

  // Moneyline-type markets (h2h, fight_to_go_distance, h2h_3way_*)
  if (marketKey.startsWith('h2h') || marketKey === 'fight_to_go_distance') {
    // Try exact match first
    let home = market.outcomes.find(o => o.name === event.homeTeam);
    let away = market.outcomes.find(o => o.name === event.awayTeam);
    const draw = market.outcomes.find(o => o.name === 'Draw');
    const yes = market.outcomes.find(o => o.name === 'Yes');
    const no = market.outcomes.find(o => o.name === 'No');
    // Fuzzy fallback for MMA/fighters with different name formats
    if ((!home || !away) && market.outcomes.length >= 2) {
      const homeNorm = event.homeTeam.toLowerCase().replace(/[^a-z]/g, '');
      const awayNorm = event.awayTeam.toLowerCase().replace(/[^a-z]/g, '');
      for (const o of market.outcomes) {
        const oNorm = o.name.toLowerCase().replace(/[^a-z]/g, '');
        if (!home && (oNorm.includes(homeNorm) || homeNorm.includes(oNorm) || _lastNameMatch(o.name, event.homeTeam))) home = o;
        else if (!away && (oNorm.includes(awayNorm) || awayNorm.includes(oNorm) || _lastNameMatch(o.name, event.awayTeam))) away = o;
      }
      // Final fallback: if we still have one side missing but 2 outcomes,
      // assign the unmatched outcome to the missing side (positional)
      if (home && !away) away = market.outcomes.find(o => o !== home && o.name !== 'Draw');
      if (away && !home) home = market.outcomes.find(o => o !== away && o.name !== 'Draw');
    }
    return {
      type: 'moneyline',
      home: home || yes || null,
      away: away || no || null,
      draw: draw || null
    };
  }
  // Spread-type markets — pick outcome closest to consensus main line for THIS event
  if (marketKey.startsWith('spreads')) {
    const home = _pickMainLineOutcome(market.outcomes, event.homeTeam, marketKey, 'home', event);
    const away = _pickMainLineOutcome(market.outcomes, event.awayTeam, marketKey, 'away', event);
    return { type: 'spread', home: home || null, away: away || null };
  }
  // Total-type markets — pick outcome closest to consensus main line for THIS event
  if (marketKey.startsWith('total') || marketKey.startsWith('team_total')) {
    const over = _pickMainLineOutcome(market.outcomes, 'Over', marketKey, 'over', event);
    const under = _pickMainLineOutcome(market.outcomes, 'Under', marketKey, 'under', event);
    return { type: 'total', over: over || null, under: under || null };
  }
  return null;
}

// Pick the outcome matching `name` that is closest to the consensus point for this event
function _pickMainLineOutcome(outcomes, name, marketKey, side, event) {
  const matches = outcomes.filter(o => o.name === name);
  if (matches.length === 0) return null;
  if (matches.length === 1) return matches[0];
  // Multiple alternates — pick closest to per-event consensus
  const consensus = computeConsensusPointForEvent(event, marketKey, side);
  if (consensus == null) return matches[0]; // fallback to first
  let best = matches[0], bestDist = Infinity;
  for (const m of matches) {
    if (m.point != null) {
      const dist = Math.abs(m.point - consensus);
      if (dist < bestDist) { bestDist = dist; best = m; }
    }
  }
  return best;
}

async function refreshData() {

async function loadOdds() {
  const container = document.getElementById('oddsContent');
  // Only show loading spinner on initial load (no data yet)
  if (!oddsData || oddsData.length === 0) {
    container.innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading odds...</div>';
  }
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 20000);
    const res = await fetch(buildUrl('/api/odds/events', { sport: currentSport }), { headers: getAuthHeaders(), signal: controller.signal });

    const data = await res.json();

      oddsData = data.events;

      renderOddsScreen();

    if (!oddsData || oddsData.length === 0) {
      container.innerHTML = `<div class="empty-state">${e.name === 'AbortError' ? 'Request timed out — try again' : 'Connection error'}</div>`;
    }
  }
}

// Pre-fetch EV and arb data in background so tab switching is instant
let prefetchInFlight = false;
async function prefetchEVAndArb() {
  if (prefetchInFlight) return;
  prefetchInFlight = true;
  try {
    const [evRes, arbRes] = await Promise.allSettled([
      fetch(buildUrl('/api/odds/ev', { sport: currentSport }), { headers: getAuthHeaders() }).then(r => r.json()),
      fetch(buildUrl('/api/odds/arbitrage', { sport: currentSport }), { headers: getAuthHeaders() }).then(r => r.json())

    if (evRes.status === 'fulfilled' && evRes.value.success) evData = evRes.value.bets;
    if (arbRes.status === 'fulfilled' && arbRes.value.success) arbData = arbRes.value.arbs;
  } catch (e) { /* silent — data will load when user switches tabs */ }
  prefetchInFlight = false;
}

// Determine the row structure for any market key
function getMarketLayout(marketKey) {
  // 3-way moneyline: three rows (Home / Away / Draw) — must check BEFORE h2h
  if (marketKey.startsWith('h2h_3way')) {
    return { type: 'moneyline', rows: ['home', 'away', 'draw'] };
  }
  // Moneyline-type: two rows (Home / Away) or (Yes / No)
  if (marketKey.startsWith('h2h') || marketKey === 'fight_to_go_distance') {
    return { type: 'moneyline', rows: ['home', 'away'] };
  }
  // Spread-type: two rows (Home / Away)
  if (marketKey.startsWith('spreads')) {
    return { type: 'spread', rows: ['home', 'away'] };
  }
  // Total-type: two rows (Over / Under)
  if (marketKey.startsWith('total') || marketKey.startsWith('team_total')) {
    return { type: 'total', rows: ['over', 'under'] };
  }
  // Default fallback: moneyline-style
  return { type: 'moneyline', rows: ['home', 'away'] };
}

// Exchange books that show liquidity
const EXCHANGE_BOOKS = new Set(['kalshi', 'prophetx', 'novig']);

// Extract odds value, point, and liquidity for a given side from generic market data
function extractOddsFromMarket(mktData, side) {
  if (!mktData) return { odds: null, point: null, liquidity: null };
  const sideData = side === 'home' ? mktData.home : side === 'away' ? mktData.away : side === 'draw' ? mktData.draw : side === 'over' ? mktData.over : side === 'under' ? mktData.under : null;
  if (!sideData) return { odds: null, point: null, liquidity: null };
  return {
    odds: sideData.price ?? null,
    point: sideData.point ?? null,
    liquidity: sideData.liquidity ?? null,
  };
}

// Row label for a given side
function getRowLabel(side, event, marketKey) {
  if (side === 'home') return event.homeTeam;
  if (side === 'away') return event.awayTeam;
  if (side === 'draw') return 'Draw';
  if (side === 'over') return 'Over';
  if (side === 'under') return 'Under';
  return side;
}

function renderOddsScreen() {
  // Per-event consensus is now computed on-the-fly (no global cache needed)
  const container = document.getElementById('oddsContent');
  const searchTerm = (document.getElementById('teamSearch')?.value || '').toLowerCase();

  let events = oddsData;
  if (searchTerm) {
    events = events.filter(e =>
      e.homeTeam.toLowerCase().includes(searchTerm) ||
      e.awayTeam.toLowerCase().includes(searchTerm)
    );
  }

  if (!events.length) {
    container.innerHTML = '<div class="empty-state">No events found for this sport right now.</div>';
    return;
  }

  const layout = getMarketLayout(currentMarket);

  // Show ALL sportsbook columns from BOOK_META filtered only by user visibility toggle.
  // Books with no data render as — (empty dashes).
  const bookKeys = Object.keys(BOOK_META).filter(k => isBookVisible(k));

  // Build table
  let html = '<div class="odds-table-wrapper"><table class="odds-table">';

  // ── Header: Sportsbook icons across top ──
  html += '<thead><tr>';
  html += '<th>Event</th>';
  html += `<th class="col-best col-best-header">
    <div class="book-icon book-icon-best">BEST</div>
    <div class="book-label">Best</div>
  </th>`;
  html += `<th class="col-avg col-avg-header">
    <div class="book-icon book-icon-avg">AVG</div>
    <div class="book-label">Average</div>
  </th>`;
  bookKeys.forEach(key => {
    const meta = BOOK_META[key] || { short: key.substring(0, 3).toUpperCase(), name: key, logo: '' };
    if (meta.logo) {
      html += `<th>
        <img class="book-logo" src="${meta.logo}" alt="${meta.name}" title="${meta.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="book-icon" style="display:none;background:rgba(255,255,255,0.1)">${meta.short}</div>
        <div class="book-label">${meta.name}</div>
      </th>`;
    } else {
      html += `<th>
        <div class="book-icon" style="background:rgba(255,255,255,0.1)">${meta.short}</div>
        <div class="book-label">${meta.name}</div>
      </th>`;
    }
  });
  html += '</tr></thead>';

  // ── Body: Events ──
  html += '<tbody>';
  events.forEach((event, idx) => {
    const gameDate = new Date(event.commenceTime);
    const timeStr = gameDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const dateStr = gameDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    const badge = getSportBadge(event.sportKey);

    // Compute best and average for each row/side
    const rowStats = {};
    layout.rows.forEach(side => {
      rowStats[side] = { best: { odds: -Infinity, book: '', bookKey: '' }, all: [] };
    });

    event.bookmakers.forEach(bm => {
      if (!isBookVisible(bm.key)) return; // respect filter
      const mktData = getMarketDataForBook(bm, currentMarket, event);
      if (!mktData) return;
      layout.rows.forEach(side => {
        const { odds } = extractOddsFromMarket(mktData, side);
        if (odds != null) {
          rowStats[side].all.push(odds);
          if (odds > rowStats[side].best.odds) {
            rowStats[side].best.odds = odds;
            rowStats[side].best.book = bm.name;
            rowStats[side].best.bookKey = bm.key;
          }
        }
      });
    });

    // Separator between events
    if (idx > 0) {
      html += `<tr class="event-separator"><td colspan="${bookKeys.length + 3}"></td></tr>`;
    }

    // Event info row
    html += `<tr class="event-info-row"><td colspan="${bookKeys.length + 3}">
      <div class="event-info">
        <div class="event-time-box">
          <span class="time-val">${timeStr}</span>
          <span class="date-val">${dateStr}</span>
        </div>
        <div>
          <span class="event-sport-badge ${badge}">${event.sportKey.split('_').pop().toUpperCase()}</span>
          <span class="event-matchup">${event.awayTeam} @ ${event.homeTeam}</span>
        </div>
        <span style="margin-left:auto;cursor:pointer;color:#71717a;padding:4px 8px;border:1px solid rgba(255,255,255,0.08);border-radius:6px;display:inline-flex;align-items:center;" onclick="openLM('${event.id}','${event.sportKey}','${event.awayTeam} @ ${event.homeTeam}')" title="View line movement"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>
      </div>
    </td></tr>`;

    // One row per side (home/away, over/under, yes/no, draw)
    layout.rows.forEach(side => {
      const label = getRowLabel(side, event, currentMarket);
      const best = rowStats[side].best;
      const allOdds = rowStats[side].all;
      const avg = avgAmericanOdds(allOdds);
      html += buildGenericRow(label, best, avg, bookKeys, event, side, currentMarket);
    });
  });

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function buildGenericRow(label, best, avg, bookKeys, event, side, marketKey) {
  let html = '<tr class="team-row">';
  html += `<td>${label}</td>`;

  // Best odds — show sportsbook logo next to odds
  if (best.odds > -Infinity) {
    const bestMeta = BOOK_META[best.bookKey] || {};
    const bestLogo = bestMeta.logo
      ? `<img class="best-book-logo" src="${bestMeta.logo}" alt="${bestMeta.short || ''}" title="${bestMeta.name || best.book}">`
      : '';
    html += `<td class="col-best"><span class="odds-val best-col" title="Best @ ${best.book}">${bestLogo}${fmtOdds(best.odds)}</span></td>`;
  } else {
    html += '<td class="col-best"><span class="odds-val empty">-</span></td>';
  }

  // Average
  if (avg != null) {
    html += `<td class="col-avg"><span class="odds-val avg-col">${fmtOdds(avg)}</span></td>`;
  } else {
    html += '<td class="col-avg"><span class="odds-val empty">-</span></td>';
  }

  // Each sportsbook column
  bookKeys.forEach(key => {
    const bm = event.bookmakers.find(b => b.key === key);
    const mktData = bm ? getMarketDataForBook(bm, marketKey, event) : null;
    const { odds, point, liquidity } = extractOddsFromMarket(mktData, side);
    let pointLabel = '';

    if (point != null) {
      const layout = getMarketLayout(marketKey);
      if (layout.type === 'spread') {
        pointLabel = `<div class="spread-label">${point > 0 ? '+' : ''}${point}</div>`;
      } else if (layout.type === 'total') {
        pointLabel = `<div class="spread-label">${point}</div>`;
      }
    }

    // Liquidity label for exchange books
    let liqLabel = '';
    if (EXCHANGE_BOOKS.has(key) && liquidity != null && liquidity > 0) {
      const liqStr = liquidity >= 1000 ? '$' + (liquidity / 1000).toFixed(1) + 'k' : '$' + Math.round(liquidity);
      liqLabel = `<div class="liquidity-label">${liqStr}</div>`;
    }

    if (odds != null) {
      const isBest = odds === best.odds;
      const cls = isBest ? 'best-highlight' : (odds > 0 ? 'positive' : 'negative');
      html += `<td><span class="odds-val ${cls}">${fmtOdds(odds)}</span>${pointLabel}${liqLabel}</td>`;
    } else {
      html += '<td><span class="odds-val empty">-</span></td>';
    }
  });

  html += '</tr>';
  return html;
}

const LM_BOOK_COLORS = [
  '#22c55e', '#3b82f6', '#f59e0b', '#ef4444', '#a855f7',

function renderLMChart() {
  const canvas = document.getElementById('lmChart');
  if (lmChart) { lmChart.destroy(); lmChart = null; }

  let filtered = lmData;
  if (lmFilterBook) filtered = filtered.filter(d => d.bookmaker_key === lmFilterBook);

  if (!filtered.length) {
    canvas.style.display = 'none';
    return;
  }
  canvas.style.display = 'block';

  // Group by bookmaker + outcome
  const series = {};
  filtered.forEach(d => {
    const key = `${d.bookmaker_key}|${d.outcome_name}`;
    if (!series[key]) series[key] = { bookmaker: d.bookmaker_key, outcome: d.outcome_name, points: [] };
    series[key].points.push({ x: new Date(d.recorded_at), y: d.price });
  });

  const datasets = [];
  const bookColorMap = {};
  let colorIdx = 0;
  Object.values(series).forEach(s => {
    if (!bookColorMap[s.bookmaker]) {
      bookColorMap[s.bookmaker] = LM_BOOK_COLORS[colorIdx % LM_BOOK_COLORS.length];
      colorIdx++;
    }
    const color = bookColorMap[s.bookmaker];
    const meta = BOOK_META[s.bookmaker] || { name: s.bookmaker };
    const isDash = s.outcome.toLowerCase().includes('away') || s.outcome.toLowerCase().includes('under') || s.outcome.toLowerCase().includes('no');
    datasets.push({
      label: `${meta.name} — ${s.outcome}`,
      data: s.points,
      borderColor: color,
      backgroundColor: color + '22',
      borderDash: isDash ? [5, 3] : [],
      borderWidth: 2,
      pointRadius: 3,
      pointHoverRadius: 5,
      stepped: 'before',
      fill: false,
    });
  });

  lmChart = new Chart(canvas, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'nearest', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { color: '#a1a1aa', font: { size: 11 }, boxWidth: 14, padding: 10 } },
        tooltip: {
          backgroundColor: '#1e2330', titleColor: '#fff', bodyColor: '#a1a1aa',
          borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, padding: 10,
          callbacks: {
            title: (items) => items[0] ? new Date(items[0].raw.x).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '',
            label: (item) => `${item.dataset.label}: ${item.raw.y > 0 ? '+' : ''}${item.raw.y}`
          }
        }
      },
      scales: {
        x: {
          type: 'time',
          time: { tooltipFormat: 'MMM d, h:mm a', displayFormats: { hour: 'ha', day: 'MMM d' } },
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#52525b', font: { size: 10 } }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: '#71717a', font: { size: 11 },
            callback: function(v) {
              // Spread/total markets show point values, ML shows American odds with +/-
              const isML = lmActiveMarket.startsWith('h2h') || lmActiveMarket === 'fight_to_go_distance';
              if (isML) return (v > 0 ? '+' : '') + v;
              return v;
            }
          }
        }
      }
    }
  });
}

function renderLMTable() {
  const wrap = document.getElementById('lmTableWrap');
  let filtered = lmData;
  if (lmFilterBook) filtered = filtered.filter(d => d.bookmaker_key === lmFilterBook);

  if (!filtered.length) {
    wrap.innerHTML = '<div class="lm-empty">No line movement recorded for this event yet. Data appears after the first odds refresh cycle.</div>';
    return;
  }

  // Build change rows (compare consecutive entries per bookmaker+outcome)
  const grouped = {};
  filtered.forEach(d => {
    const key = `${d.bookmaker_key}|${d.outcome_name}`;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(d);
  });

  const changes = [];
  Object.values(grouped).forEach(entries => {
    entries.sort((a, b) => new Date(a.recorded_at) - new Date(b.recorded_at));
    for (let i = 1; i < entries.length; i++) {
      const prev = entries[i - 1];
      const curr = entries[i];
      changes.push({
        time: curr.recorded_at,
        bookmaker: curr.bookmaker_key,
        outcome: curr.outcome_name,
        oldPrice: prev.price,
        newPrice: curr.price,
        oldPoint: prev.point,
        newPoint: curr.point,
        diff: curr.price - prev.price,
      });
    }
  });

  changes.sort((a, b) => new Date(b.time) - new Date(a.time));

  let html = '<table class="lm-table"><thead><tr><th>Time</th><th>Book</th><th>Outcome</th><th>Old</th><th>New</th><th>Change</th></tr></thead><tbody>';

  if (changes.length === 0) {
    html += `<tr><td colspan="6" style="text-align:center;color:#52525b;padding:20px;">No line changes detected yet (lines are stable).</td></tr>`;
  } else {
    changes.slice(0, 50).forEach(c => {
      const meta = BOOK_META[c.bookmaker] || { name: c.bookmaker };
      const t = new Date(c.time);
      const timeStr = t.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
      const diffClass = c.diff > 0 ? 'lm-up' : c.diff < 0 ? 'lm-down' : '';
      const diffStr = c.diff > 0 ? `+${c.diff}` : `${c.diff}`;
      const pointStr = c.newPoint != null ? ` (${c.newPoint > 0 ? '+' : ''}${c.newPoint})` : '';
      html += `<tr>
        <td>${timeStr}</td>
        <td>${meta.name}</td>
        <td>${c.outcome}${pointStr}</td>
        <td>${c.oldPrice > 0 ? '+' : ''}${c.oldPrice}</td>
        <td>${c.newPrice > 0 ? '+' : ''}${c.newPrice}</td>
        <td class="${diffClass}">${diffStr}</td>
      </tr>`;
    });
  }

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

// ── EV Detail Modal ──
async function openEVDetail(betIdx) {
  const bet = evData[betIdx];
  if (!bet) return;

  // Set title & subtitle
  document.getElementById('evDetailTitle').textContent = `${bet.awayTeam} @ ${bet.homeTeam}`;
  document.getElementById('evDetailSubtitle').textContent = `${bet.team} — ${bet.marketType}`;

  // Stats bar
  document.getElementById('evDetailStats').innerHTML = `
    <div class="ev-detail-stat"><div class="label">Your Odds</div><div class="val" style="color:#fff;">${fmtOdds(bet.odds)}</div></div>
    <div class="ev-detail-stat"><div class="label">Fair Odds</div><div class="val" style="color:#3b82f6;">${fmtOdds(bet.fairOdds)}</div></div>
    <div class="ev-detail-stat"><div class="label">EV%</div><div class="val" style="color:#22c55e;">+${bet.ev.toFixed(1)}%</div></div>
    <div class="ev-detail-stat"><div class="label">Best At</div><div class="val" style="color:#06b6d4;">${bet.bookmakerName}</div></div>
  `;

  // Show modal immediately
  document.getElementById('evDetailOverlay').classList.add('open');

  // Ensure odds data is loaded for this sport
  if (!oddsData || oddsData.length === 0) {
    document.getElementById('evDetailTable').innerHTML = '<div style="text-align:center;color:#71717a;padding:20px;">Loading odds data...</div>';
    try {
      const res = await fetch(buildUrl('/api/odds/events', { sport: bet.sportKey || currentSport }), { headers: getAuthHeaders() });
      const data = await res.json();
      if (data.success) oddsData = data.events;
    } catch (e) {
      document.getElementById('evDetailTable').innerHTML = '<div style="text-align:center;color:#ef4444;padding:20px;">Failed to load odds data</div>';
      return;
    }
  }

  // Find this event in oddsData
  const event = oddsData.find(e => e.id === bet.eventId);
  if (!event) {
    document.getElementById('evDetailTable').innerHTML = '<div style="text-align:center;color:#71717a;padding:20px;">Event not found in current odds data</div>';
    return;
  }

  // Determine market key and extract odds from all books
  const mKey = bet.marketKey || guessMarketKey(bet);
  const isMoneyline = mKey.startsWith('h2h') || mKey === 'fight_to_go_distance';
  const isSpread = mKey.startsWith('spreads');

  // Collect odds from every sportsbook
  const rows = [];
  for (const bm of event.bookmakers) {
    if (!bm.markets || !bm.markets[mKey]) continue;
    const mkt = bm.markets[mKey];
    const meta = BOOK_META[bm.key] || { short: bm.key.substring(0, 3).toUpperCase(), name: bm.name || bm.key, logo: '' };

    let betSideOdds = null, oppSideOdds = null, betSideName = bet.team, oppSideName = '';

    if (isMoneyline) {
      const betOutcome = mkt.outcomes.find(o => o.name === bet.team);
      const oppOutcome = mkt.outcomes.find(o => o.name !== bet.team);
      betSideOdds = betOutcome?.price;
      oppSideOdds = oppOutcome?.price;
      oppSideName = oppOutcome?.name || '';
    } else if (isSpread) {
      const betOutcome = mkt.outcomes.find(o => o.name === bet.team);
      const oppOutcome = mkt.outcomes.find(o => o.name !== bet.team);
      betSideOdds = betOutcome?.price;
      oppSideOdds = oppOutcome?.price;
      oppSideName = oppOutcome?.name || '';
    } else {
      // Total/team total
      const betOutcome = mkt.outcomes.find(o => o.name === bet.team);
      const oppOutcome = mkt.outcomes.find(o => o.name !== bet.team);
      betSideOdds = betOutcome?.price;
      oppSideOdds = oppOutcome?.price;
      oppSideName = oppOutcome?.name || '';
    }

    rows.push({ key: bm.key, meta, betSideOdds, oppSideOdds, oppSideName });
  }

  // Also add books with no data for this market
  for (const bKey of Object.keys(BOOK_META)) {
    if (!rows.find(r => r.key === bKey)) {
      rows.push({ key: bKey, meta: BOOK_META[bKey], betSideOdds: null, oppSideOdds: null, oppSideName: '' });
    }
  }

  // Find best odds for highlighting
  const bestBetOdds = Math.max(...rows.filter(r => r.betSideOdds).map(r => r.betSideOdds));

  // Determine opposite side name
  const oppName = rows.find(r => r.oppSideName)?.oppSideName || 'Opponent';

  // Build table
  let tableHtml = `<table class="ev-odds-table">
    <thead><tr><th>Sportsbook</th><th>${bet.team}</th><th>${oppName}</th></tr></thead><tbody>`;

  for (const row of rows) {
    const logoHtml = row.meta.logo ? `<img src="${row.meta.logo}" alt="${row.meta.short}" onerror="this.style.display='none'">` : '';
    const isBest = row.betSideOdds === bestBetOdds && row.betSideOdds != null;
    const isSource = row.key === bet.bookmaker;
    const betClass = isBest ? 'best-odds' : isSource ? 'ev-source' : '';
    const betOddsStr = row.betSideOdds ? `<span class="${betClass}">${fmtOdds(row.betSideOdds)}</span>` : '<span class="ev-odds-no-data">—</span>';
    const oppOddsStr = row.oppSideOdds ? fmtOdds(row.oppSideOdds) : '<span class="ev-odds-no-data">—</span>';
    tableHtml += `<tr><td><div class="book-cell">${logoHtml} ${row.meta.name}</div></td><td>${betOddsStr}</td><td>${oppOddsStr}</td></tr>`;
  }

  tableHtml += '</tbody></table>';
  document.getElementById('evDetailTable').innerHTML = tableHtml;
}

function closeEVDetail() {
  document.getElementById('evDetailOverlay').classList.remove('open');
}

// Fallback market key guesser (if server doesn't provide marketKey)
function guessMarketKey(bet) {
  const mt = bet.marketType || '';
  const suffixMap = { ' 1H': '_h1', ' Q1': '_q1', ' P1': '_p1', ' F5': '_f5', ' F7': '_f7', ' 1st Inn': '_i1' };
  let suffix = '';
  for (const [s, k] of Object.entries(suffixMap)) {
    if (mt.includes(s)) { suffix = k; break; }
  }
  if (mt.startsWith('ML') || mt.startsWith('Go Distance')) return (mt === 'Go Distance' ? 'fight_to_go_distance' : 'h2h') + suffix;
  if (mt.startsWith('Spread')) return 'spreads' + suffix;
  if (mt.startsWith('Team Total')) return 'team_totals' + suffix;
  if (mt.startsWith('Total Rounds')) return 'total_rounds' + suffix;
  if (mt.startsWith('Total')) return 'totals' + suffix;
  return 'h2h' + suffix;
}

// ── Helpers ──

// Properly average American odds by converting to implied probability,
// averaging the probabilities, then converting back. This prevents
// impossible or misleading averages like "+38" or "-42" for NBA games.
function avgAmericanOdds(oddsArr) {
  if (!oddsArr || oddsArr.length === 0) return null;
  let totalProb = 0;
  let count = 0;
  for (const odds of oddsArr) {
    if (odds == null || odds === 0) continue;
    // Skip invalid odds — valid American odds are <= -100 or >= +100
    if (odds > -100 && odds < 100) continue;
    // Convert American odds to implied probability
    let prob;
    if (odds > 0) prob = 100 / (odds + 100);
    else prob = Math.abs(odds) / (Math.abs(odds) + 100);
    totalProb += prob;
    count++;
  }
  if (count === 0) return null;
  const avgProb = totalProb / count;
  // Convert back to American odds
  if (avgProb >= 0.5) return Math.round(-(avgProb / (1 - avgProb)) * 100);
  return Math.round(((1 - avgProb) / avgProb) * 100);
}

function fmtOdds(odds) {
  if (!odds || odds === 0) return '-';
  // Skip invalid odds between -99 and +99 (likely unconverted cent/probability values)
  if (odds > -100 && odds < 100) return '-';
  return odds > 0 ? '+' + odds : '' + odds;
}

function getSportBadge(sportKey) {
  if (!sportKey) return 'badge-default';
  const k = sportKey.toLowerCase();
  if (k.includes('nba')) return 'badge-nba';
  if (k.includes('ncaab')) return 'badge-ncaab';
  if (k.includes('nfl') || k.includes('ncaaf')) return 'badge-nfl';
  if (k.includes('mlb') || k.includes('baseball')) return 'badge-mlb';
  if (k.includes('nhl') || k.includes('hockey')) return 'badge-nhl';
  if (k.includes('soccer') || k.includes('epl') || k.includes('mls') || k.includes('liga') || k.includes('serie') || k.includes('ligue') || k.includes('bundesliga') || k.includes('uefa')) return 'badge-soccer';
  if (k.includes('mma') || k.includes('ufc')) return 'badge-mma';
  if (k.includes('boxing')) return 'badge-boxing';
  if (k.includes('tennis') || k.includes('atp') || k.includes('wta')) return 'badge-tennis';
  return 'badge-default';
}

// ── Auto-Auth (Members Only) ──
(async function autoAuth() {
  const savedKey = sessionStorage.getItem('soldi_odds_key');
  if (savedKey) { currentApiKey = savedKey; showDashboard(); return; }

  const token = localStorage.getItem('soldi_token');
  if (token) {
    try {
      const res = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      if (res.ok && data.success) {
        currentApiKey = data.apiKey || localStorage.getItem('soldi_api_key') || 'jwt_auth';
        sessionStorage.setItem('soldi_odds_key', currentApiKey);
        showDashboard();
        return;
      }
    } catch {}
  }

  const lsKey = localStorage.getItem('soldi_api_key');
  if (lsKey) {
    try {
      const res = await fetch('/api/validate-key?key=' + encodeURIComponent(lsKey));
      const data = await res.json();
      if (res.ok && data.success) {
        currentApiKey = lsKey;
        sessionStorage.setItem('soldi_odds_key', lsKey);
        showDashboard();
        return;
      }
    } catch {}
  }

  showGate();
})();
