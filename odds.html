<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odds Screen - Soldi</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="/soldi-analytics.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050507; color: #e4e4e7; font-family: 'Inter', system-ui, sans-serif; }

    /* ── Nav ── */
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(5,5,7,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { height: 32px; }
    .nav-logo span { font-weight: 800; font-size: 20px; color: #fff; }
    .nav-links { display: flex; align-items: center; gap: 16px; }
    .nav-links a { color: #a1a1aa; text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: #22c55e; }

    /* ── Main ── */
    .odds-page { padding: 80px 24px 40px; min-height: 100vh; max-width: 1400px; margin: 0 auto; }

    /* ── Gate ── */
    .odds-gate { max-width: 460px; margin: 100px auto 0; text-align: center; }
    .odds-gate h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .odds-gate p { color: #71717a; margin-bottom: 24px; font-size: 14px; }
    .odds-gate form { display: flex; gap: 8px; }
    .odds-gate input { flex: 1; padding: 12px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 14px; outline: none; }
    .odds-gate input:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.15); }
    .odds-gate button { padding: 12px 24px; background: linear-gradient(135deg, #22c55e, #16a34a); color: #050507; font-weight: 700; font-size: 14px; border: none; border-radius: 10px; cursor: pointer; }
    .odds-gate .error-msg { color: #ef4444; font-size: 13px; margin-top: 8px; }

    /* ── Dashboard ── */
    .odds-dashboard { display: none; }

    /* ── Tabs ── */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 20px; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 4px; border: 1px solid rgba(255,255,255,0.06); }
    .tab-btn { flex: 1; padding: 10px 16px; background: transparent; border: none; border-radius: 8px; color: #71717a; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: #22c55e; color: #050507; }
    .tab-btn:hover:not(.active) { color: #e4e4e7; background: rgba(255,255,255,0.05); }

    /* ── Sport Filters ── */
    .sport-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .sport-chip { padding: 6px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; color: #a1a1aa; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .sport-chip.active { background: rgba(34,197,94,0.15); border-color: #22c55e; color: #22c55e; }
    .sport-chip:hover:not(.active) { border-color: rgba(255,255,255,0.2); color: #e4e4e7; }

    /* ── Stats Bar ── */
    .stats-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 16px 20px; flex: 1; min-width: 140px; }
    .stat-card .label { font-size: 12px; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .stat-card .value { font-size: 22px; font-weight: 800; color: #fff; }
    .stat-card .value.green { color: #22c55e; }

    /* ── Loading ── */
    .loading-state { text-align: center; padding: 60px 20px; color: #71717a; }
    .loading-state .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #22c55e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; color: #52525b; font-size: 15px; }

    /* ── Tab Content ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Odds Table (Tab 1) ── */
    .market-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
    .market-tab { padding: 6px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; color: #a1a1aa; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .market-tab.active { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.3); color: #22c55e; }

    .event-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
    .event-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .event-teams { font-weight: 700; font-size: 15px; color: #fff; }
    .event-time { font-size: 12px; color: #71717a; }
    .event-sport-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-right: 8px; }

    .odds-grid { display: grid; grid-template-columns: 120px repeat(3, 1fr); font-size: 13px; }
    .odds-grid-header { display: contents; }
    .odds-grid-header > div { padding: 8px 12px; background: rgba(255,255,255,0.02); color: #71717a; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .odds-grid-row { display: contents; }
    .odds-grid-row > div { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; }
    .odds-grid-row .book-name { font-weight: 600; color: #a1a1aa; font-size: 12px; }
    .odds-cell { font-weight: 600; font-family: 'JetBrains Mono', monospace, 'Inter'; font-size: 13px; }
    .odds-cell.best { color: #22c55e; }
    .odds-cell.negative { color: #ef4444; }
    .point-label { font-size: 11px; color: #71717a; margin-left: 4px; }

    /* ── EV Cards (Tab 2) ── */
    .ev-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 18px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; transition: border-color 0.2s; }
    .ev-card:hover { border-color: rgba(34,197,94,0.2); }
    .ev-left { display: flex; flex-direction: column; gap: 4px; }
    .ev-game { font-size: 13px; color: #a1a1aa; }
    .ev-team { font-size: 16px; font-weight: 700; color: #fff; }
    .ev-market { font-size: 12px; color: #71717a; }
    .ev-right { display: flex; gap: 16px; align-items: center; text-align: center; }
    .ev-metric { display: flex; flex-direction: column; gap: 2px; }
    .ev-metric .label { font-size: 10px; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; }
    .ev-metric .val { font-size: 16px; font-weight: 800; }
    .ev-metric .val.green { color: #22c55e; }
    .ev-metric .val.blue { color: #3b82f6; }
    .ev-book { display: inline-block; padding: 3px 8px; background: rgba(255,255,255,0.06); border-radius: 6px; font-size: 11px; font-weight: 600; color: #a1a1aa; margin-top: 4px; }

    /* ── Arb Cards (Tab 3) ── */
    .arb-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 18px; margin-bottom: 10px; }
    .arb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .arb-game { font-size: 15px; font-weight: 700; color: #fff; }
    .arb-profit { font-size: 20px; font-weight: 800; color: #22c55e; }
    .arb-profit-label { font-size: 11px; color: #71717a; }
    .arb-legs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .arb-leg { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 12px 14px; }
    .arb-leg .book { font-size: 11px; color: #71717a; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
    .arb-leg .team { font-size: 14px; font-weight: 700; color: #e4e4e7; }
    .arb-leg .odds { font-size: 14px; font-weight: 700; color: #3b82f6; }
    .arb-leg .stake { font-size: 13px; color: #22c55e; font-weight: 600; margin-top: 4px; }

    /* ── Refresh ── */
    .refresh-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-size: 12px; color: #52525b; }
    .refresh-bar button { padding: 6px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #a1a1aa; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .refresh-bar button:hover { background: rgba(34,197,94,0.12); color: #22c55e; border-color: rgba(34,197,94,0.3); }

    /* ── Sport Badge Colors ── */
    .badge-nba { background: rgba(200,16,46,0.15); color: #e8384f; }
    .badge-nfl { background: rgba(1,51,105,0.2); color: #6b9bd2; }
    .badge-mlb { background: rgba(0,51,160,0.2); color: #5b8fd4; }
    .badge-nhl { background: rgba(0,0,0,0.3); color: #a1a1aa; }
    .badge-ncaab { background: rgba(255,165,0,0.15); color: #f59e0b; }
    .badge-ncaaf { background: rgba(255,165,0,0.15); color: #f59e0b; }
    .badge-soccer { background: rgba(56,0,60,0.3); color: #c084fc; }
    .badge-mma { background: rgba(213,0,0,0.15); color: #ef4444; }
    .badge-boxing { background: rgba(213,0,0,0.15); color: #ef4444; }
    .badge-tennis { background: rgba(196,181,49,0.15); color: #eab308; }
    .badge-default { background: rgba(255,255,255,0.06); color: #a1a1aa; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .odds-page { padding: 72px 12px 24px; }
      .tab-bar { flex-wrap: nowrap; overflow-x: auto; }
      .tab-btn { font-size: 12px; padding: 8px 12px; white-space: nowrap; }
      .stats-bar { gap: 8px; }
      .stat-card { min-width: 100px; padding: 12px; }
      .stat-card .value { font-size: 18px; }
      .ev-card { grid-template-columns: 1fr; }
      .ev-right { justify-content: flex-start; }
      .arb-legs { grid-template-columns: 1fr; }
      .odds-grid { grid-template-columns: 90px repeat(3, 1fr); font-size: 12px; }
      .odds-grid-row > div, .odds-grid-header > div { padding: 6px 8px; }
    }
  </style>
</head>
<body>
  <!-- Nav -->
  <nav class="nav">
    <a href="/" class="nav-logo">
      <img src="/images/soldi-logo.svg" alt="Soldi" onerror="this.style.display='none'">
      <span>Soldi</span>
    </a>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="#" onclick="logoutOdds()" style="color:#ef4444;">Logout</a>
    </div>
  </nav>

  <div class="odds-page">
    <!-- Members-Only Gate -->
    <div class="odds-gate" id="oddsGate">
      <div style="font-size:48px;margin-bottom:16px;">🔒</div>
      <h2>Members Only</h2>
      <p>Live odds, +EV bets, and arbitrage opportunities are exclusively available to Soldi members.</p>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px;">
        <a href="/" style="padding:12px 24px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#050507;font-weight:700;font-size:14px;border:none;border-radius:10px;text-decoration:none;text-align:center;">Log In</a>
        <a href="https://whop.com/soldi/" target="_blank" style="padding:12px 24px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#e4e4e7;font-weight:600;font-size:14px;border-radius:10px;text-decoration:none;text-align:center;">Get Access →</a>
      </div>
      <div class="error-msg" id="oddsError"></div>
    </div>

    <!-- Dashboard -->
    <div class="odds-dashboard" id="oddsDashboard">
      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('odds', this)">📊 Odds Screen</button>
        <button class="tab-btn" onclick="switchTab('ev', this)">🔥 +EV Bets</button>
        <button class="tab-btn" onclick="switchTab('arb', this)">💰 Arbitrage</button>
      </div>

      <!-- Sport Filter -->
      <div class="sport-bar" id="sportBar"></div>

      <!-- Stats -->
      <div class="stats-bar" id="statsBar"></div>

      <!-- Refresh Bar -->
      <div class="refresh-bar">
        <span id="lastUpdated">Loading...</span>
        <button onclick="refreshData()">↻ Refresh</button>
      </div>

      <!-- Tab: Odds Screen -->
      <div class="tab-content active" id="tabOdds">
        <div class="market-tabs" id="marketTabs">
          <div class="market-tab active" onclick="switchMarket('h2h', this)">Moneyline</div>
          <div class="market-tab" onclick="switchMarket('spreads', this)">Spreads</div>
          <div class="market-tab" onclick="switchMarket('totals', this)">Totals</div>
        </div>
        <div id="oddsContent">
          <div class="loading-state"><div class="spinner"></div>Loading odds...</div>
        </div>
      </div>

      <!-- Tab: +EV Bets -->
      <div class="tab-content" id="tabEV">
        <div id="evContent">
          <div class="loading-state"><div class="spinner"></div>Calculating +EV bets...</div>
        </div>
      </div>

      <!-- Tab: Arbitrage -->
      <div class="tab-content" id="tabArb">
        <div id="arbContent">
          <div class="loading-state"><div class="spinner"></div>Scanning for arbitrage...</div>
        </div>
      </div>
    </div>
  </div>

<script>
// ── State ──
let currentApiKey = null;
let currentTab = 'odds';
let currentSport = 'basketball_nba';
let currentMarket = 'h2h';
let sportCategories = [];
let oddsData = [];
let evData = [];
let arbData = [];
let refreshTimer = null;

function getAuthHeaders() {
  const token = localStorage.getItem('soldi_token');
  return token ? { 'Authorization': 'Bearer ' + token } : {};
}

function buildUrl(endpoint, params = {}) {
  const url = new URL(endpoint, window.location.origin);
  if (currentApiKey && currentApiKey !== 'jwt_auth') url.searchParams.set('key', currentApiKey);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  return url.toString();
}

// ── Auth ──
function showDashboard() {
  document.getElementById('oddsGate').style.display = 'none';
  document.getElementById('oddsDashboard').style.display = 'block';
  loadSports();
}

function showGate(msg) {
  document.getElementById('oddsGate').style.display = '';
  document.getElementById('oddsDashboard').style.display = 'none';
  if (msg) document.getElementById('oddsError').textContent = msg;
  if (refreshTimer) clearInterval(refreshTimer);
}

function logoutOdds() {
  currentApiKey = null;
  sessionStorage.removeItem('soldi_odds_key');
  localStorage.removeItem('soldi_token');
  localStorage.removeItem('soldi_api_key');
  showGate();
}

// ── Sports ──
async function loadSports() {
  try {
    const res = await fetch(buildUrl('/api/odds/sports'), { headers: getAuthHeaders() });
    const data = await res.json();
    if (data.success) {
      sportCategories = data.categories;
      renderSportBar();
      refreshData();
      // Auto-refresh every 30s
      refreshTimer = setInterval(refreshData, 30000);
    }
  } catch (e) {
    console.error('Failed to load sports:', e);
  }
}

function renderSportBar() {
  const bar = document.getElementById('sportBar');
  let html = '';
  sportCategories.forEach(cat => {
    cat.leagues.forEach(league => {
      const active = league.key === currentSport ? 'active' : '';
      html += `<div class="sport-chip ${active}" onclick="selectSport('${league.key}', this)">${cat.icon} ${league.name}</div>`;
    });
  });
  bar.innerHTML = html;
}

function selectSport(sportKey, el) {
  currentSport = sportKey;
  document.querySelectorAll('.sport-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  refreshData();
}

// ── Tabs ──
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(tab === 'odds' ? 'tabOdds' : tab === 'ev' ? 'tabEV' : 'tabArb').classList.add('active');
  refreshData();
}

function switchMarket(market, el) {
  currentMarket = market;
  document.querySelectorAll('.market-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  renderOddsScreen();
}

// ── Data Loading ──
async function refreshData() {
  const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('lastUpdated').textContent = `Last updated: ${now}`;

  if (currentTab === 'odds') await loadOdds();
  else if (currentTab === 'ev') await loadEV();
  else if (currentTab === 'arb') await loadArb();
}

async function loadOdds() {
  const container = document.getElementById('oddsContent');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading odds...</div>';
  try {
    const res = await fetch(buildUrl('/api/odds/events', { sport: currentSport }), { headers: getAuthHeaders() });
    const data = await res.json();
    if (data.success) {
      oddsData = data.events;
      renderStats('odds');
      renderOddsScreen();
    } else {
      container.innerHTML = `<div class="empty-state">⚠️ ${data.error || 'Failed to load odds'}</div>`;
    }
  } catch (e) {
    container.innerHTML = '<div class="empty-state">⚠️ Connection error</div>';
  }
}

async function loadEV() {
  const container = document.getElementById('evContent');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div>Calculating +EV bets...</div>';
  try {
    const res = await fetch(buildUrl('/api/odds/ev', { sport: currentSport }), { headers: getAuthHeaders() });
    const data = await res.json();
    if (data.success) {
      evData = data.bets;
      renderStats('ev');
      renderEVBets();
    } else {
      container.innerHTML = `<div class="empty-state">⚠️ ${data.error || 'Failed to calculate EV'}</div>`;
    }
  } catch (e) {
    container.innerHTML = '<div class="empty-state">⚠️ Connection error</div>';
  }
}

async function loadArb() {
  const container = document.getElementById('arbContent');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div>Scanning for arbitrage...</div>';
  try {
    const res = await fetch(buildUrl('/api/odds/arbitrage', { sport: currentSport }), { headers: getAuthHeaders() });
    const data = await res.json();
    if (data.success) {
      arbData = data.arbs;
      renderStats('arb');
      renderArbitrage();
    } else {
      container.innerHTML = `<div class="empty-state">⚠️ ${data.error || 'Failed to scan arbitrage'}</div>`;
    }
  } catch (e) {
    container.innerHTML = '<div class="empty-state">⚠️ Connection error</div>';
  }
}

// ── Stats ──
function renderStats(tab) {
  const bar = document.getElementById('statsBar');
  if (tab === 'odds') {
    const events = oddsData.length;
    const books = new Set(oddsData.flatMap(e => e.bookmakers.map(b => b.key))).size;
    bar.innerHTML = `
      <div class="stat-card"><div class="label">Events</div><div class="value">${events}</div></div>
      <div class="stat-card"><div class="label">Sportsbooks</div><div class="value">${books}</div></div>
      <div class="stat-card"><div class="label">Sport</div><div class="value">${currentSport.split('_').pop().toUpperCase()}</div></div>
    `;
  } else if (tab === 'ev') {
    const count = evData.length;
    const avgEV = count > 0 ? (evData.reduce((s, b) => s + b.ev, 0) / count).toFixed(1) : '0';
    const bestEV = count > 0 ? evData[0].ev.toFixed(1) : '0';
    bar.innerHTML = `
      <div class="stat-card"><div class="label">+EV Bets Found</div><div class="value green">${count}</div></div>
      <div class="stat-card"><div class="label">Avg EV%</div><div class="value green">${avgEV}%</div></div>
      <div class="stat-card"><div class="label">Best EV%</div><div class="value green">${bestEV}%</div></div>
    `;
  } else if (tab === 'arb') {
    const count = arbData.length;
    const bestProfit = count > 0 ? arbData[0].profit.toFixed(2) : '0';
    bar.innerHTML = `
      <div class="stat-card"><div class="label">Arb Opportunities</div><div class="value green">${count}</div></div>
      <div class="stat-card"><div class="label">Best Profit</div><div class="value green">${bestProfit}%</div></div>
      <div class="stat-card"><div class="label">On $100 Stake</div><div class="value green">$${count > 0 ? (100 * arbData[0].profit / 100).toFixed(2) : '0'}</div></div>
    `;
  }
}

// ── Render: Odds Screen ──
function renderOddsScreen() {
  const container = document.getElementById('oddsContent');
  if (!oddsData.length) {
    container.innerHTML = '<div class="empty-state">No events found for this sport right now.</div>';
    return;
  }

  let html = '';
  oddsData.forEach(event => {
    const gameTime = new Date(event.commenceTime).toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    const badge = getSportBadge(event.sportKey);

    // Find best odds for highlighting
    const bestOdds = { home: -Infinity, away: -Infinity, over: -Infinity, under: -Infinity };
    event.bookmakers.forEach(bm => {
      if (currentMarket === 'h2h' && bm.moneyline) {
        if (bm.moneyline.home > bestOdds.home) bestOdds.home = bm.moneyline.home;
        if (bm.moneyline.away > bestOdds.away) bestOdds.away = bm.moneyline.away;
      } else if (currentMarket === 'spreads' && bm.spread) {
        if (bm.spread.home > bestOdds.home) bestOdds.home = bm.spread.home;
        if (bm.spread.away > bestOdds.away) bestOdds.away = bm.spread.away;
      } else if (currentMarket === 'totals' && bm.total) {
        if (bm.total.over > bestOdds.over) bestOdds.over = bm.total.over;
        if (bm.total.under > bestOdds.under) bestOdds.under = bm.total.under;
      }
    });

    html += `<div class="event-card">`;
    html += `<div class="event-header">
      <div><span class="event-sport-badge ${badge}">${event.sportKey.split('_').pop().toUpperCase()}</span><span class="event-teams">${event.awayTeam} @ ${event.homeTeam}</span></div>
      <div class="event-time">${gameTime}</div>
    </div>`;

    // Grid header
    if (currentMarket === 'h2h') {
      html += `<div class="odds-grid"><div class="odds-grid-header"><div>Book</div><div>${event.homeTeam.split(' ').pop()}</div><div>${event.awayTeam.split(' ').pop()}</div><div>Draw</div></div>`;
    } else if (currentMarket === 'spreads') {
      html += `<div class="odds-grid"><div class="odds-grid-header"><div>Book</div><div>${event.homeTeam.split(' ').pop()}</div><div>${event.awayTeam.split(' ').pop()}</div><div>Points</div></div>`;
    } else {
      html += `<div class="odds-grid"><div class="odds-grid-header"><div>Book</div><div>Over</div><div>Under</div><div>Line</div></div>`;
    }

    event.bookmakers.forEach(bm => {
      if (currentMarket === 'h2h' && bm.moneyline) {
        const hClass = bm.moneyline.home === bestOdds.home ? 'best' : '';
        const aClass = bm.moneyline.away === bestOdds.away ? 'best' : '';
        html += `<div class="odds-grid-row">
          <div class="book-name">${bm.name}</div>
          <div><span class="odds-cell ${hClass}">${fmtOdds(bm.moneyline.home)}</span></div>
          <div><span class="odds-cell ${aClass}">${fmtOdds(bm.moneyline.away)}</span></div>
          <div><span class="odds-cell">${bm.moneyline.draw ? fmtOdds(bm.moneyline.draw) : '-'}</span></div>
        </div>`;
      } else if (currentMarket === 'spreads' && bm.spread) {
        const hClass = bm.spread.home === bestOdds.home ? 'best' : '';
        const aClass = bm.spread.away === bestOdds.away ? 'best' : '';
        html += `<div class="odds-grid-row">
          <div class="book-name">${bm.name}</div>
          <div><span class="odds-cell ${hClass}">${fmtOdds(bm.spread.home)}</span><span class="point-label">${bm.spread.homePoint > 0 ? '+' : ''}${bm.spread.homePoint}</span></div>
          <div><span class="odds-cell ${aClass}">${fmtOdds(bm.spread.away)}</span><span class="point-label">${bm.spread.awayPoint > 0 ? '+' : ''}${bm.spread.awayPoint}</span></div>
          <div><span class="odds-cell">${bm.spread.homePoint > 0 ? '+' : ''}${bm.spread.homePoint}</span></div>
        </div>`;
      } else if (currentMarket === 'totals' && bm.total) {
        const oClass = bm.total.over === bestOdds.over ? 'best' : '';
        const uClass = bm.total.under === bestOdds.under ? 'best' : '';
        html += `<div class="odds-grid-row">
          <div class="book-name">${bm.name}</div>
          <div><span class="odds-cell ${oClass}">${fmtOdds(bm.total.over)}</span></div>
          <div><span class="odds-cell ${uClass}">${fmtOdds(bm.total.under)}</span></div>
          <div><span class="odds-cell">${bm.total.overPoint}</span></div>
        </div>`;
      }
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
}

// ── Render: +EV Bets ──
function renderEVBets() {
  const container = document.getElementById('evContent');
  if (!evData.length) {
    container.innerHTML = '<div class="empty-state">No +EV bets found for this sport right now. Try another sport or check back later.</div>';
    return;
  }
  let html = '';
  evData.forEach(bet => {
    const badge = getSportBadge(bet.sportKey);
    html += `<div class="ev-card">
      <div class="ev-left">
        <div class="ev-game"><span class="event-sport-badge ${badge}" style="font-size:10px;padding:1px 6px;">${bet.sportKey?.split('_').pop().toUpperCase() || ''}</span> ${bet.awayTeam} @ ${bet.homeTeam}</div>
        <div class="ev-team">${bet.team} — ${bet.marketType}</div>
        <div class="ev-book">${bet.bookmakerName}</div>
      </div>
      <div class="ev-right">
        <div class="ev-metric"><div class="label">Your Odds</div><div class="val">${fmtOdds(bet.odds)}</div></div>
        <div class="ev-metric"><div class="label">Fair Odds</div><div class="val blue">${fmtOdds(bet.fairOdds)}</div></div>
        <div class="ev-metric"><div class="label">EV%</div><div class="val green">+${bet.ev.toFixed(1)}%</div></div>
        <div class="ev-metric"><div class="label">Kelly%</div><div class="val">${bet.kelly.toFixed(1)}%</div></div>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

// ── Render: Arbitrage ──
function renderArbitrage() {
  const container = document.getElementById('arbContent');
  if (!arbData.length) {
    container.innerHTML = '<div class="empty-state">No arbitrage opportunities found right now. These are rare — check back often!</div>';
    return;
  }
  let html = '';
  arbData.forEach(arb => {
    const badge = getSportBadge(arb.sportKey);
    html += `<div class="arb-card">
      <div class="arb-header">
        <div class="arb-game"><span class="event-sport-badge ${badge}" style="font-size:10px;padding:1px 6px;">${arb.sportKey?.split('_').pop().toUpperCase() || ''}</span> ${arb.awayTeam} @ ${arb.homeTeam}</div>
        <div style="text-align:right;">
          <div class="arb-profit">+${arb.profit.toFixed(2)}%</div>
          <div class="arb-profit-label">Guaranteed Profit</div>
        </div>
      </div>
      <div class="arb-legs">
        ${arb.bets.map(b => `<div class="arb-leg">
          <div class="book">${b.bookmakerName}</div>
          <div class="team">${b.team}</div>
          <div class="odds">${fmtOdds(b.odds)}</div>
          <div class="stake">Stake: $${b.stake.toFixed(2)}</div>
        </div>`).join('')}
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

// ── Helpers ──
function fmtOdds(odds) {
  if (!odds || odds === 0) return '-';
  return odds > 0 ? '+' + odds : '' + odds;
}

function getSportBadge(sportKey) {
  if (!sportKey) return 'badge-default';
  const k = sportKey.toLowerCase();
  if (k.includes('nba')) return 'badge-nba';
  if (k.includes('ncaab')) return 'badge-ncaab';
  if (k.includes('nfl') || k.includes('ncaaf')) return 'badge-nfl';
  if (k.includes('mlb') || k.includes('baseball')) return 'badge-mlb';
  if (k.includes('nhl') || k.includes('hockey')) return 'badge-nhl';
  if (k.includes('soccer') || k.includes('epl') || k.includes('mls') || k.includes('liga') || k.includes('serie') || k.includes('ligue') || k.includes('bundesliga') || k.includes('uefa')) return 'badge-soccer';
  if (k.includes('mma') || k.includes('ufc')) return 'badge-mma';
  if (k.includes('boxing')) return 'badge-boxing';
  if (k.includes('tennis') || k.includes('atp') || k.includes('wta')) return 'badge-tennis';
  return 'badge-default';
}

// ── Auto-Auth (Members Only) ──
(async function autoAuth() {
  // Check for stored session key first (fast path)
  const savedKey = sessionStorage.getItem('soldi_odds_key');
  if (savedKey) { currentApiKey = savedKey; showDashboard(); return; }

  // Verify membership via JWT token
  const token = localStorage.getItem('soldi_token');
  if (token) {
    try {
      const res = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      if (res.ok && data.success) {
        currentApiKey = data.apiKey || localStorage.getItem('soldi_api_key') || 'jwt_auth';
        sessionStorage.setItem('soldi_odds_key', currentApiKey);
        showDashboard();
        return;
      }
    } catch {}
  }

  // Also try localStorage API key (for members who logged in previously)
  const lsKey = localStorage.getItem('soldi_api_key');
  if (lsKey) {
    try {
      const res = await fetch('/api/validate-key?key=' + encodeURIComponent(lsKey));
      const data = await res.json();
      if (res.ok && data.success) {
        currentApiKey = lsKey;
        sessionStorage.setItem('soldi_odds_key', lsKey);
        showDashboard();
        return;
      }
    } catch {}
  }

  // No valid membership — show gate
  showGate();
})();
</script>
