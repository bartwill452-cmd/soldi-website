<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odds Screen - Soldi</title>
  <script>
    (function() {
      var t = localStorage.getItem('soldi_theme');
      if (!t) t = 'dark';
      if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="/soldi-analytics.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg-secondary); color: var(--text-primary); font-family: 'Inter', system-ui, sans-serif; }

    /* ── Nav ── */
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(13,17,23,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border-color); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { height: 32px; }
    .nav-logo span { font-weight: 800; font-size: 20px; color: var(--text-heading); }
    .nav-links { display: flex; align-items: center; gap: 16px; }
    .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: #22c55e; }

    /* ── Main ── */
    .odds-page { padding: 80px 16px 40px; min-height: 100vh; max-width: 1600px; margin: 0 auto; }

    /* ── Gate ── */
    .odds-gate { max-width: 460px; margin: 100px auto 0; text-align: center; }
    .odds-gate h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .odds-gate p { color: var(--text-muted); margin-bottom: 24px; font-size: 14px; }
    .odds-gate button { padding: 12px 24px; background: linear-gradient(135deg, #22c55e, #16a34a); color: var(--bg-primary); font-weight: 700; font-size: 14px; border: none; border-radius: 10px; cursor: pointer; }
    .odds-gate .error-msg { color: #ef4444; font-size: 13px; margin-top: 8px; }

    /* ── Dashboard ── */
    .odds-dashboard { display: none; }

    /* ── Tabs ── */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 20px; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 4px; border: 1px solid rgba(255,255,255,0.06); }
    .tab-btn { flex: 1; padding: 10px 16px; background: transparent; border: none; border-radius: 8px; color: #71717a; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: #22c55e; color: #050507; }
    .tab-btn:hover:not(.active) { color: #e4e4e7; background: rgba(255,255,255,0.05); }

    /* ── Sport Filters ── */
    .sport-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .sport-chip { padding: 6px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; color: #a1a1aa; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .sport-chip.active { background: rgba(34,197,94,0.15); border-color: #22c55e; color: #22c55e; }
    .sport-chip:hover:not(.active) { border-color: rgba(255,255,255,0.2); color: #e4e4e7; }

    /* ── Stats Bar ── */
    .stats-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 16px 20px; flex: 1; min-width: 140px; }
    .stat-card .label { font-size: 12px; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .stat-card .value { font-size: 22px; font-weight: 800; color: var(--text-heading); }
    .stat-card .value.green { color: #22c55e; }

    /* ── Loading ── */
    .loading-state { text-align: center; padding: 60px 20px; color: #71717a; }
    .loading-state .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #22c55e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; color: #52525b; font-size: 15px; }

    /* ── Tab Content ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Market Tabs ── */
    .market-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
    .market-tab { padding: 6px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; color: #a1a1aa; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .market-tab.active { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.3); color: #22c55e; }

    /* ── Search Box ── */
    .search-box { margin-bottom: 16px; }
    .search-box input { width: 100%; max-width: 320px; padding: 10px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #fff; font-size: 13px; outline: none; }
    .search-box input:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.12); }
    .search-box input::placeholder { color: #52525b; }

    /* ═══════════════════════════════════════════
       ODDS TABLE — Pick The Odds Style
       Sportsbook icons across top, odds underneath
       ═══════════════════════════════════════════ */

    .odds-table-wrapper { overflow-x: auto; border-radius: 14px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.02); }

    .odds-table { width: 100%; border-collapse: collapse; min-width: 900px; }

    /* Column headers — sportsbook icons */
    .odds-table thead th {
      padding: 12px 6px 10px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: #71717a;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .odds-table thead th:first-child {
      text-align: left;
      padding-left: 16px;
      min-width: 220px;
      position: sticky;
      left: 0;
      z-index: 3;
      background: rgba(13,17,23,0.98);
    }

    /* Sportsbook logo in header */
    .book-logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      margin: 0 auto 4px;
      object-fit: contain;
      background: rgba(255,255,255,0.06);
      padding: 2px;
    }
    /* Fallback text icon when no image */
    .book-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 11px;
      margin: 0 auto 4px;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .book-icon-best { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .book-icon-avg { background: rgba(255,255,255,0.15); color: #a1a1aa; }

    .book-label { font-size: 10px; color: #71717a; font-weight: 500; }

    /* Special columns: Best & Avg */
    .col-best, .col-avg { background: rgba(255,255,255,0.03) !important; }

    /* Event rows */
    .odds-table tbody tr.event-separator td {
      padding: 0;
      height: 8px;
      background: transparent;
      border: none;
    }

    .odds-table tbody tr.event-info-row td {
      padding: 10px 16px 2px;
      border: none;
      background: rgba(255,255,255,0.015);
    }

    .event-info { display: flex; align-items: center; gap: 12px; }
    .event-info .event-time-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 56px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      font-size: 11px;
      color: #71717a;
      line-height: 1.3;
    }
    .event-info .event-time-box .time-val { font-weight: 700; color: #a1a1aa; font-size: 12px; }
    .event-info .event-time-box .date-val { font-size: 10px; }
    .event-matchup { font-weight: 700; font-size: 15px; color: #fff; }
    .event-sport-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-right: 8px; }

    /* Odds rows (home team & away team) */
    .odds-table tbody tr.team-row td {
      padding: 6px 6px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .odds-table tbody tr.team-row:last-child td {
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .team-row td:first-child {
      text-align: left;
      padding-left: 16px;
      font-weight: 600;
      font-size: 13px;
      color: #e4e4e7;
      position: sticky;
      left: 0;
      background: rgba(13,17,23,0.98);
      z-index: 1;
    }

    /* Odds cell */
    .odds-val {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 13px;
      font-family: 'Inter', monospace;
      cursor: default;
      transition: background 0.15s;
      min-width: 58px;
      text-align: center;
    }
    .odds-val:hover { background: rgba(255,255,255,0.06); }
    .odds-val.positive { color: #22c55e; }
    .odds-val.negative { color: #e4e4e7; }
    .odds-val.best-highlight {
      background: rgba(34,197,94,0.15);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.3);
    }
    .odds-val.empty { color: #3f3f46; }
    .odds-val.best-col {
      background: rgba(34,197,94,0.12);
      color: #22c55e;
      font-weight: 800;
    }
    .odds-val.avg-col {
      color: #a1a1aa;
      font-weight: 600;
    }

    /* Point spread label underneath odds */
    .spread-label { font-size: 10px; color: #52525b; margin-top: 1px; }

    /* ── Best Odds / Average Boxes ── */
    .col-best-header, .col-avg-header {
      min-width: 70px;
    }

    /* ── EV Cards (Tab 2) ── */
    .ev-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 18px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; transition: border-color 0.2s; }
    .ev-card:hover { border-color: rgba(34,197,94,0.2); }
    .ev-left { display: flex; flex-direction: column; gap: 4px; }
    .ev-game { font-size: 13px; color: #a1a1aa; }
    .ev-team { font-size: 16px; font-weight: 700; color: #fff; }
    .ev-market { font-size: 12px; color: #71717a; }
    .ev-right { display: flex; gap: 16px; align-items: center; text-align: center; }
    .ev-metric { display: flex; flex-direction: column; gap: 2px; }
    .ev-metric .label { font-size: 10px; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; }
    .ev-metric .val { font-size: 16px; font-weight: 800; }
    .ev-metric .val.green { color: #22c55e; }
    .ev-metric .val.blue { color: #3b82f6; }
    .ev-book { display: inline-block; padding: 3px 8px; background: rgba(255,255,255,0.06); border-radius: 6px; font-size: 11px; font-weight: 600; color: #a1a1aa; margin-top: 4px; }

    /* ── Arb Cards (Tab 3) ── */
    .arb-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 18px; margin-bottom: 10px; }
    .arb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .arb-game { font-size: 15px; font-weight: 700; color: #fff; }
    .arb-profit { font-size: 20px; font-weight: 800; color: #22c55e; }
    .arb-profit-label { font-size: 11px; color: #71717a; }
    .arb-legs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .arb-leg { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 12px 14px; }
    .arb-leg .book { font-size: 11px; color: #71717a; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
    .arb-leg .team { font-size: 14px; font-weight: 700; color: #e4e4e7; }
    .arb-leg .odds { font-size: 14px; font-weight: 700; color: #3b82f6; }
    .arb-leg .stake { font-size: 13px; color: #22c55e; font-weight: 600; margin-top: 4px; }

    /* ── Refresh ── */
    .refresh-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-size: 12px; color: #52525b; }
    .refresh-bar button { padding: 6px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #a1a1aa; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .refresh-bar button:hover { background: rgba(34,197,94,0.12); color: #22c55e; border-color: rgba(34,197,94,0.3); }

    /* ── Sport Badge Colors ── */
    .badge-nba { background: rgba(200,16,46,0.15); color: #e8384f; }
    .badge-nfl { background: rgba(1,51,105,0.2); color: #6b9bd2; }
    .badge-mlb { background: rgba(0,51,160,0.2); color: #5b8fd4; }
    .badge-nhl { background: rgba(0,0,0,0.3); color: #a1a1aa; }
    .badge-ncaab { background: rgba(255,165,0,0.15); color: #f59e0b; }
    .badge-ncaaf { background: rgba(255,165,0,0.15); color: #f59e0b; }
    .badge-soccer { background: rgba(56,0,60,0.3); color: #c084fc; }
    .badge-mma { background: rgba(213,0,0,0.15); color: #ef4444; }
    .badge-boxing { background: rgba(213,0,0,0.15); color: #ef4444; }
    .badge-tennis { background: rgba(196,181,49,0.15); color: #eab308; }
    .badge-default { background: rgba(255,255,255,0.06); color: #a1a1aa; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .odds-page { padding: 72px 8px 24px; }
      .tab-bar { flex-wrap: nowrap; overflow-x: auto; }
      .tab-btn { font-size: 12px; padding: 8px 12px; white-space: nowrap; }
      .stats-bar { gap: 8px; }
      .stat-card { min-width: 100px; padding: 12px; }
      .stat-card .value { font-size: 18px; }
      .ev-card { grid-template-columns: 1fr; }
      .ev-right { justify-content: flex-start; }
      .arb-legs { grid-template-columns: 1fr; }
      .book-logo { width: 30px; height: 30px; border-radius: 8px; }
      .book-icon { width: 30px; height: 30px; font-size: 9px; border-radius: 8px; }
      .book-label { font-size: 9px; }
      .odds-val { font-size: 11px; min-width: 48px; padding: 3px 4px; }
      .team-row td:first-child { font-size: 12px; }
      .event-matchup { font-size: 13px; }
    }
  </style>
</head>
<body>
  <!-- Nav -->
  <nav class="nav">
    <a href="/" class="nav-logo">
      <img src="/images/soldi-logo.svg" alt="Soldi" onerror="this.style.display='none'">
      <span>Soldi</span>
    </a>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="#" onclick="logoutOdds()" style="color:#ef4444;">Logout</a>
      <button class="theme-toggle" aria-label="Toggle theme">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </div>
  </nav>

  <div class="odds-page">
    <!-- Members-Only Gate -->
    <div class="odds-gate" id="oddsGate">
      <div style="font-size:48px;margin-bottom:16px;">🔒</div>
      <h2>Members Only</h2>
      <p>Live odds, +EV bets, and arbitrage opportunities are exclusively available to Soldi members.</p>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px;">
        <a href="/" style="padding:12px 24px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#050507;font-weight:700;font-size:14px;border:none;border-radius:10px;text-decoration:none;text-align:center;">Log In</a>
        <a href="https://whop.com/soldi/" target="_blank" style="padding:12px 24px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#e4e4e7;font-weight:600;font-size:14px;border-radius:10px;text-decoration:none;text-align:center;">Get Access →</a>
      </div>
      <div class="error-msg" id="oddsError"></div>
    </div>

    <!-- Dashboard -->
    <div class="odds-dashboard" id="oddsDashboard">
      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('odds', this)">Odds Screen</button>
        <button class="tab-btn" onclick="switchTab('ev', this)">+EV Bets</button>
        <button class="tab-btn" onclick="switchTab('arb', this)">Arbitrage</button>
      </div>

      <!-- Sport Filter -->
      <div class="sport-bar" id="sportBar"></div>

      <!-- Stats -->
      <div class="stats-bar" id="statsBar"></div>

      <!-- Refresh Bar -->
      <div class="refresh-bar">
        <span id="lastUpdated">Loading...</span>
        <button onclick="refreshData()">↻ Refresh</button>
      </div>

      <!-- Tab: Odds Screen -->
      <div class="tab-content active" id="tabOdds">
        <div class="market-tabs" id="marketTabs">
          <div class="market-tab active" onclick="switchMarket('h2h', this)">Moneyline</div>
          <div class="market-tab" onclick="switchMarket('spreads', this)">Spreads</div>
          <div class="market-tab" onclick="switchMarket('totals', this)">Totals</div>
        </div>
        <div class="search-box">
          <input type="text" id="teamSearch" placeholder="Search teams..." oninput="filterOdds()">
        </div>
        <div id="oddsContent">
          <div class="loading-state"><div class="spinner"></div>Loading odds...</div>
        </div>
      </div>

      <!-- Tab: +EV Bets -->
      <div class="tab-content" id="tabEV">
        <div id="evContent">
          <div class="loading-state"><div class="spinner"></div>Calculating +EV bets...</div>
        </div>
      </div>

      <!-- Tab: Arbitrage -->
      <div class="tab-content" id="tabArb">
        <div id="arbContent">
          <div class="loading-state"><div class="spinner"></div>Scanning for arbitrage...</div>
        </div>
      </div>
    </div>
  </div>

<script>
// ── State ──
let currentApiKey = null;
let currentTab = 'odds';
let currentSport = 'basketball_nba';
let currentMarket = 'h2h';
let sportCategories = [];
let oddsData = [];
let evData = [];
let arbData = [];
let refreshTimer = null;

// Sportsbook metadata with logo images
const BOOK_META = {
  fanduel:       { short: 'FD',  name: 'FanDuel',      logo: '/images/books/fanduel.png' },
  draftkings:    { short: 'DK',  name: 'DraftKings',   logo: '/images/books/draftkings.png' },
  betmgm:        { short: 'MGM', name: 'BetMGM',       logo: '/images/books/betmgm.png' },
  pinnacle:      { short: 'PIN', name: 'Pinnacle',      logo: '/images/books/pinnacle.png' },
  williamhill_us:{ short: 'CZR', name: 'Caesars',       logo: '/images/books/caesars.png' },
  bovada:        { short: 'BOV', name: 'Bovada',        logo: '/images/books/bovada.png' },
  betonlineag:   { short: 'BOL', name: 'BetOnline',     logo: '/images/books/betonline.png' },
  betrivers:     { short: 'BR',  name: 'BetRivers',     logo: '/images/books/betrivers.png' },
  hardrock:      { short: 'HR',  name: 'Hard Rock',     logo: '/images/books/hardrock.png' },
  novig:         { short: 'NOV', name: 'Novig',         logo: '/images/books/novig.png' },
  bookmaker:     { short: 'BM',  name: 'Bookmaker',     logo: '/images/books/bookmaker.png' },
  bet105:        { short: '105', name: 'Bet105',        logo: '/images/books/bet105.png' },
  xbet:          { short: 'XB',  name: 'XBet',          logo: '/images/books/xbet.png' },
  buckeye:       { short: 'BKY', name: 'Buckeye',       logo: '/images/books/buckeye.png' },
  prophetx:      { short: 'PX',  name: 'ProphetX',      logo: '/images/books/prophetx.png' },
};

function getAuthHeaders() {
  const token = localStorage.getItem('soldi_token');
  return token ? { 'Authorization': 'Bearer ' + token } : {};
}

function buildUrl(endpoint, params = {}) {
  const url = new URL(endpoint, window.location.origin);
  if (currentApiKey && currentApiKey !== 'jwt_auth') url.searchParams.set('key', currentApiKey);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  return url.toString();
}

// ── Auth ──
function showDashboard() {
  document.getElementById('oddsGate').style.display = 'none';
  document.getElementById('oddsDashboard').style.display = 'block';
  loadSports();
}

function showGate(msg) {
  document.getElementById('oddsGate').style.display = '';
  document.getElementById('oddsDashboard').style.display = 'none';
  if (msg) document.getElementById('oddsError').textContent = msg;
  if (refreshTimer) clearInterval(refreshTimer);
}

function logoutOdds() {
  currentApiKey = null;
  sessionStorage.removeItem('soldi_odds_key');
  localStorage.removeItem('soldi_token');
  localStorage.removeItem('soldi_api_key');
  showGate();
}

// ── Sports ──
async function loadSports() {
  try {
    const res = await fetch(buildUrl('/api/odds/sports'), { headers: getAuthHeaders() });
    const data = await res.json();
    if (data.success) {
      sportCategories = data.categories;
      renderSportBar();
      refreshData();
      refreshTimer = setInterval(refreshData, 30000);
    }
  } catch (e) {
    console.error('Failed to load sports:', e);
  }
}

function renderSportBar() {
  const bar = document.getElementById('sportBar');
  let html = '';
  sportCategories.forEach(cat => {
    cat.leagues.forEach(league => {
      const active = league.key === currentSport ? 'active' : '';
      html += `<div class="sport-chip ${active}" onclick="selectSport('${league.key}', this)">${cat.icon} ${league.name}</div>`;
    });
  });
  bar.innerHTML = html;
}

function selectSport(sportKey, el) {
  currentSport = sportKey;
  document.querySelectorAll('.sport-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  refreshData();
}

// ── Tabs ──
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(tab === 'odds' ? 'tabOdds' : tab === 'ev' ? 'tabEV' : 'tabArb').classList.add('active');
  refreshData();
}

function switchMarket(market, el) {
  currentMarket = market;
  document.querySelectorAll('.market-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  renderOddsScreen();
}

// ── Data Loading ──
async function refreshData() {
  const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('lastUpdated').textContent = `Last updated: ${now}`;
  if (currentTab === 'odds') await loadOdds();
  else if (currentTab === 'ev') await loadEV();
  else if (currentTab === 'arb') await loadArb();
}

async function loadOdds() {
  const container = document.getElementById('oddsContent');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading odds...</div>';
  try {
    const res = await fetch(buildUrl('/api/odds/events', { sport: currentSport }), { headers: getAuthHeaders() });
    const data = await res.json();
    if (data.success) {
      oddsData = data.events;
      renderStats('odds');
      renderOddsScreen();
    } else {
      container.innerHTML = `<div class="empty-state">${data.error || 'Failed to load odds'}</div>`;
    }
  } catch (e) {
    container.innerHTML = '<div class="empty-state">Connection error</div>';
  }
}

async function loadEV() {
  const container = document.getElementById('evContent');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div>Calculating +EV bets...</div>';
  try {
    const res = await fetch(buildUrl('/api/odds/ev', { sport: currentSport }), { headers: getAuthHeaders() });
    const data = await res.json();
    if (data.success) {
      evData = data.bets;
      renderStats('ev');
      renderEVBets();
    } else {
      container.innerHTML = `<div class="empty-state">${data.error || 'Failed to calculate EV'}</div>`;
    }
  } catch (e) {
    container.innerHTML = '<div class="empty-state">Connection error</div>';
  }
}

async function loadArb() {
  const container = document.getElementById('arbContent');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div>Scanning for arbitrage...</div>';
  try {
    const res = await fetch(buildUrl('/api/odds/arbitrage', { sport: currentSport }), { headers: getAuthHeaders() });
    const data = await res.json();
    if (data.success) {
      arbData = data.arbs;
      renderStats('arb');
      renderArbitrage();
    } else {
      container.innerHTML = `<div class="empty-state">${data.error || 'Failed to scan arbitrage'}</div>`;
    }
  } catch (e) {
    container.innerHTML = '<div class="empty-state">Connection error</div>';
  }
}

// ── Stats ──
function renderStats(tab) {
  const bar = document.getElementById('statsBar');
  if (tab === 'odds') {
    const events = oddsData.length;
    const books = new Set(oddsData.flatMap(e => e.bookmakers.map(b => b.key))).size;
    bar.innerHTML = `
      <div class="stat-card"><div class="label">Events</div><div class="value">${events}</div></div>
      <div class="stat-card"><div class="label">Sportsbooks</div><div class="value">${books}</div></div>
      <div class="stat-card"><div class="label">Sport</div><div class="value">${currentSport.split('_').pop().toUpperCase()}</div></div>
    `;
  } else if (tab === 'ev') {
    const count = evData.length;
    const avgEV = count > 0 ? (evData.reduce((s, b) => s + b.ev, 0) / count).toFixed(1) : '0';
    const bestEV = count > 0 ? evData[0].ev.toFixed(1) : '0';
    bar.innerHTML = `
      <div class="stat-card"><div class="label">+EV Bets Found</div><div class="value green">${count}</div></div>
      <div class="stat-card"><div class="label">Avg EV%</div><div class="value green">${avgEV}%</div></div>
      <div class="stat-card"><div class="label">Best EV%</div><div class="value green">${bestEV}%</div></div>
    `;
  } else if (tab === 'arb') {
    const count = arbData.length;
    const bestProfit = count > 0 ? arbData[0].profit.toFixed(2) : '0';
    bar.innerHTML = `
      <div class="stat-card"><div class="label">Arb Opportunities</div><div class="value green">${count}</div></div>
      <div class="stat-card"><div class="label">Best Profit</div><div class="value green">${bestProfit}%</div></div>
      <div class="stat-card"><div class="label">On $100 Stake</div><div class="value green">$${count > 0 ? (100 * arbData[0].profit / 100).toFixed(2) : '0'}</div></div>
    `;
  }
}

function filterOdds() {
  renderOddsScreen();
}

// ══════════════════════════════════════════
//  RENDER: ODDS SCREEN (Pick The Odds Style)
// ══════════════════════════════════════════
function renderOddsScreen() {
  const container = document.getElementById('oddsContent');
  const searchTerm = (document.getElementById('teamSearch')?.value || '').toLowerCase();

  let events = oddsData;
  if (searchTerm) {
    events = events.filter(e =>
      e.homeTeam.toLowerCase().includes(searchTerm) ||
      e.awayTeam.toLowerCase().includes(searchTerm)
    );
  }

  if (!events.length) {
    container.innerHTML = '<div class="empty-state">No events found for this sport right now.</div>';
    return;
  }

  // Collect all unique sportsbooks that have data for the current market
  const bookKeysSet = new Set();
  events.forEach(event => {
    event.bookmakers.forEach(bm => {
      if (currentMarket === 'h2h' && bm.moneyline) bookKeysSet.add(bm.key);
      else if (currentMarket === 'spreads' && bm.spread) bookKeysSet.add(bm.key);
      else if (currentMarket === 'totals' && bm.total) bookKeysSet.add(bm.key);
    });
  });
  const bookKeys = Array.from(bookKeysSet);

  // Build table
  let html = '<div class="odds-table-wrapper"><table class="odds-table">';

  // ── Header: Sportsbook icons across top ──
  html += '<thead><tr>';
  html += '<th>Event</th>';
  // Best Odds column
  html += `<th class="col-best col-best-header">
    <div class="book-icon book-icon-best">BEST</div>
    <div class="book-label">Best</div>
  </th>`;
  // Average column
  html += `<th class="col-avg col-avg-header">
    <div class="book-icon book-icon-avg">AVG</div>
    <div class="book-label">Average</div>
  </th>`;
  // Sportsbook columns with actual logos
  bookKeys.forEach(key => {
    const meta = BOOK_META[key] || { short: key.substring(0, 3).toUpperCase(), name: key, logo: '' };
    if (meta.logo) {
      html += `<th>
        <img class="book-logo" src="${meta.logo}" alt="${meta.name}" title="${meta.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="book-icon" style="display:none;background:rgba(255,255,255,0.1)">${meta.short}</div>
        <div class="book-label">${meta.name}</div>
      </th>`;
    } else {
      html += `<th>
        <div class="book-icon" style="background:rgba(255,255,255,0.1)">${meta.short}</div>
        <div class="book-label">${meta.name}</div>
      </th>`;
    }
  });
  html += '</tr></thead>';

  // ── Body: Events ──
  html += '<tbody>';
  events.forEach((event, idx) => {
    const gameDate = new Date(event.commenceTime);
    const timeStr = gameDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const dateStr = gameDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    const badge = getSportBadge(event.sportKey);

    // Compute best and average for each side
    const bestHome = { odds: -Infinity, book: '' };
    const bestAway = { odds: -Infinity, book: '' };
    const bestOver = { odds: -Infinity, book: '' };
    const bestUnder = { odds: -Infinity, book: '' };
    const allHome = [], allAway = [], allOver = [], allUnder = [];
    const spreadPoints = {};

    event.bookmakers.forEach(bm => {
      if (currentMarket === 'h2h' && bm.moneyline) {
        if (bm.moneyline.home != null) {
          allHome.push(bm.moneyline.home);
          if (bm.moneyline.home > bestHome.odds) { bestHome.odds = bm.moneyline.home; bestHome.book = bm.name; }
        }
        if (bm.moneyline.away != null) {
          allAway.push(bm.moneyline.away);
          if (bm.moneyline.away > bestAway.odds) { bestAway.odds = bm.moneyline.away; bestAway.book = bm.name; }
        }
      } else if (currentMarket === 'spreads' && bm.spread) {
        if (bm.spread.home != null) {
          allHome.push(bm.spread.home);
          if (bm.spread.home > bestHome.odds) { bestHome.odds = bm.spread.home; bestHome.book = bm.name; }
        }
        if (bm.spread.away != null) {
          allAway.push(bm.spread.away);
          if (bm.spread.away > bestAway.odds) { bestAway.odds = bm.spread.away; bestAway.book = bm.name; }
        }
        spreadPoints[bm.key] = { home: bm.spread.homePoint, away: bm.spread.awayPoint };
      } else if (currentMarket === 'totals' && bm.total) {
        if (bm.total.over != null) {
          allOver.push(bm.total.over);
          if (bm.total.over > bestOver.odds) { bestOver.odds = bm.total.over; bestOver.book = bm.name; }
        }
        if (bm.total.under != null) {
          allUnder.push(bm.total.under);
          if (bm.total.under > bestUnder.odds) { bestUnder.odds = bm.total.under; bestUnder.book = bm.name; }
        }
      }
    });

    const avgHome = allHome.length ? Math.round(allHome.reduce((a,b) => a+b, 0) / allHome.length) : null;
    const avgAway = allAway.length ? Math.round(allAway.reduce((a,b) => a+b, 0) / allAway.length) : null;
    const avgOver = allOver.length ? Math.round(allOver.reduce((a,b) => a+b, 0) / allOver.length) : null;
    const avgUnder = allUnder.length ? Math.round(allUnder.reduce((a,b) => a+b, 0) / allUnder.length) : null;

    // Separator between events
    if (idx > 0) {
      html += `<tr class="event-separator"><td colspan="${bookKeys.length + 3}"></td></tr>`;
    }

    // Event info row spanning full width
    html += `<tr class="event-info-row"><td colspan="${bookKeys.length + 3}">
      <div class="event-info">
        <div class="event-time-box">
          <span class="time-val">${timeStr}</span>
          <span class="date-val">${dateStr}</span>
        </div>
        <div>
          <span class="event-sport-badge ${badge}">${event.sportKey.split('_').pop().toUpperCase()}</span>
          <span class="event-matchup">${event.awayTeam} @ ${event.homeTeam}</span>
        </div>
      </div>
    </td></tr>`;

    if (currentMarket === 'h2h') {
      // Home team row
      html += buildTeamRow(event.homeTeam, bestHome, avgHome, bookKeys, event, 'home', 'h2h');
      // Away team row
      html += buildTeamRow(event.awayTeam, bestAway, avgAway, bookKeys, event, 'away', 'h2h');
    } else if (currentMarket === 'spreads') {
      html += buildTeamRow(event.homeTeam, bestHome, avgHome, bookKeys, event, 'home', 'spreads', spreadPoints);
      html += buildTeamRow(event.awayTeam, bestAway, avgAway, bookKeys, event, 'away', 'spreads', spreadPoints);
    } else if (currentMarket === 'totals') {
      html += buildTeamRow('Over', bestOver, avgOver, bookKeys, event, 'over', 'totals');
      html += buildTeamRow('Under', bestUnder, avgUnder, bookKeys, event, 'under', 'totals');
    }
  });

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function buildTeamRow(label, best, avg, bookKeys, event, side, market, spreadPoints) {
  let html = '<tr class="team-row">';
  // Team name
  html += `<td>${label}</td>`;

  // Best odds
  if (best.odds > -Infinity) {
    html += `<td class="col-best"><span class="odds-val best-col" title="Best @ ${best.book}">${fmtOdds(best.odds)}</span></td>`;
  } else {
    html += '<td class="col-best"><span class="odds-val empty">-</span></td>';
  }

  // Average
  if (avg != null) {
    html += `<td class="col-avg"><span class="odds-val avg-col">${fmtOdds(avg)}</span></td>`;
  } else {
    html += '<td class="col-avg"><span class="odds-val empty">-</span></td>';
  }

  // Each sportsbook column
  bookKeys.forEach(key => {
    const bm = event.bookmakers.find(b => b.key === key);
    let odds = null;
    let spreadLabel = '';

    if (market === 'h2h' && bm?.moneyline) {
      odds = side === 'home' ? bm.moneyline.home : bm.moneyline.away;
    } else if (market === 'spreads' && bm?.spread) {
      odds = side === 'home' ? bm.spread.home : bm.spread.away;
      const pt = side === 'home' ? bm.spread.homePoint : bm.spread.awayPoint;
      if (pt != null) spreadLabel = `<div class="spread-label">${pt > 0 ? '+' : ''}${pt}</div>`;
    } else if (market === 'totals' && bm?.total) {
      odds = side === 'over' ? bm.total.over : bm.total.under;
      const pt = bm.total.overPoint;
      if (pt != null) spreadLabel = `<div class="spread-label">${pt}</div>`;
    }

    if (odds != null) {
      const isBest = odds === best.odds;
      const cls = isBest ? 'best-highlight' : (odds > 0 ? 'positive' : 'negative');
      html += `<td><span class="odds-val ${cls}">${fmtOdds(odds)}</span>${spreadLabel}</td>`;
    } else {
      html += '<td><span class="odds-val empty">-</span></td>';
    }
  });

  html += '</tr>';
  return html;
}

// ── Render: +EV Bets ──
function renderEVBets() {
  const container = document.getElementById('evContent');
  if (!evData.length) {
    container.innerHTML = '<div class="empty-state">No +EV bets found for this sport right now. Try another sport or check back later.</div>';
    return;
  }
  let html = '';
  evData.forEach(bet => {
    const badge = getSportBadge(bet.sportKey);
    html += `<div class="ev-card">
      <div class="ev-left">
        <div class="ev-game"><span class="event-sport-badge ${badge}" style="font-size:10px;padding:1px 6px;">${bet.sportKey?.split('_').pop().toUpperCase() || ''}</span> ${bet.awayTeam} @ ${bet.homeTeam}</div>
        <div class="ev-team">${bet.team} — ${bet.marketType}</div>
        <div class="ev-book">${bet.bookmakerName}</div>
      </div>
      <div class="ev-right">
        <div class="ev-metric"><div class="label">Your Odds</div><div class="val">${fmtOdds(bet.odds)}</div></div>
        <div class="ev-metric"><div class="label">Fair Odds</div><div class="val blue">${fmtOdds(bet.fairOdds)}</div></div>
        <div class="ev-metric"><div class="label">EV%</div><div class="val green">+${bet.ev.toFixed(1)}%</div></div>
        <div class="ev-metric"><div class="label">Kelly%</div><div class="val">${bet.kelly.toFixed(1)}%</div></div>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

// ── Render: Arbitrage ──
function renderArbitrage() {
  const container = document.getElementById('arbContent');
  if (!arbData.length) {
    container.innerHTML = '<div class="empty-state">No arbitrage opportunities found right now. These are rare — check back often!</div>';
    return;
  }
  let html = '';
  arbData.forEach(arb => {
    const badge = getSportBadge(arb.sportKey);
    html += `<div class="arb-card">
      <div class="arb-header">
        <div class="arb-game"><span class="event-sport-badge ${badge}" style="font-size:10px;padding:1px 6px;">${arb.sportKey?.split('_').pop().toUpperCase() || ''}</span> ${arb.awayTeam} @ ${arb.homeTeam}</div>
        <div style="text-align:right;">
          <div class="arb-profit">+${arb.profit.toFixed(2)}%</div>
          <div class="arb-profit-label">Guaranteed Profit</div>
        </div>
      </div>
      <div class="arb-legs">
        ${arb.bets.map(b => `<div class="arb-leg">
          <div class="book">${b.bookmakerName}</div>
          <div class="team">${b.team}</div>
          <div class="odds">${fmtOdds(b.odds)}</div>
          <div class="stake">Stake: $${b.stake.toFixed(2)}</div>
        </div>`).join('')}
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

// ── Helpers ──
function fmtOdds(odds) {
  if (!odds || odds === 0) return '-';
  return odds > 0 ? '+' + odds : '' + odds;
}

function getSportBadge(sportKey) {
  if (!sportKey) return 'badge-default';
  const k = sportKey.toLowerCase();
  if (k.includes('nba')) return 'badge-nba';
  if (k.includes('ncaab')) return 'badge-ncaab';
  if (k.includes('nfl') || k.includes('ncaaf')) return 'badge-nfl';
  if (k.includes('mlb') || k.includes('baseball')) return 'badge-mlb';
  if (k.includes('nhl') || k.includes('hockey')) return 'badge-nhl';
  if (k.includes('soccer') || k.includes('epl') || k.includes('mls') || k.includes('liga') || k.includes('serie') || k.includes('ligue') || k.includes('bundesliga') || k.includes('uefa')) return 'badge-soccer';
  if (k.includes('mma') || k.includes('ufc')) return 'badge-mma';
  if (k.includes('boxing')) return 'badge-boxing';
  if (k.includes('tennis') || k.includes('atp') || k.includes('wta')) return 'badge-tennis';
  return 'badge-default';
}

// ── Auto-Auth (Members Only) ──
(async function autoAuth() {
  const savedKey = sessionStorage.getItem('soldi_odds_key');
  if (savedKey) { currentApiKey = savedKey; showDashboard(); return; }

  const token = localStorage.getItem('soldi_token');
  if (token) {
    try {
      const res = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      if (res.ok && data.success) {
        currentApiKey = data.apiKey || localStorage.getItem('soldi_api_key') || 'jwt_auth';
        sessionStorage.setItem('soldi_odds_key', currentApiKey);
        showDashboard();
        return;
      }
    } catch {}
  }

  const lsKey = localStorage.getItem('soldi_api_key');
  if (lsKey) {
    try {
      const res = await fetch('/api/validate-key?key=' + encodeURIComponent(lsKey));
      const data = await res.json();
      if (res.ok && data.success) {
        currentApiKey = lsKey;
        sessionStorage.setItem('soldi_odds_key', lsKey);
        showDashboard();
        return;
      }
    } catch {}
  }

  showGate();
})();
